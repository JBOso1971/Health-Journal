<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Health Journal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ── DESIGN TOKENS ──────────────────────────────────────────────── */
    :root {
      --navy-dark:  #0d1b2a;
      --navy-mid:   #1b2d45;
      --navy-light: #243447;
      --navy-edge:  #0a1623;
      --accent:        #2a6496;
      --accent-bright: #3a8fd1;
      --accent-tint:   #eef4f9;
      --paper:      #f4f1ea;
      --paper-2:    #fbf8f1;
      --paper-edge: #ece7dc;
      --paper-line: #d6cfbf;
      --paper-hold: #f7eee0;
      --ink:        #1e293b;
      --ink-dim:    #5b6776;
      --ink-muted:  #94a3b8;
      --on-navy-fg:     #e6edf3;
      --on-navy-fg-dim: #94a3b8;
      --state-ok:      #22c55e;
      --state-warn:    #d97706;
      --state-err:     #dc2626;
      --state-pending: #cbd5e1;
      --confirm-bg: #eef7ee;
      --s-1:2px; --s-2:4px; --s-3:6px; --s-4:8px; --s-5:10px;
      --s-6:12px; --s-7:14px; --s-8:16px; --s-9:18px; --s-10:20px;
      --s-11:24px; --s-12:28px; --s-13:32px; --s-14:40px;
      --bw-hair:1px; --bw-rule:1.5px; --bw-emph:3px;
      --r-0:0; --r-1:2px; --r-full:9999px;
      --rule-solid:  1px solid var(--paper-line);
      --rule-dashed: 1px dashed var(--paper-line);
      --rule-dotted: 1px dotted var(--paper-line);
      --shadow-frame: 0 30px 80px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.35);
      --font-sans:  'Inter', Arial, system-ui, sans-serif;
      --font-serif: Georgia, 'Noto Serif', serif;
      --font-mono:  'JetBrains Mono', 'Roboto Mono', ui-monospace, monospace;
    }

    /* ── RESET ────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%; background: var(--navy-edge);
      font-family: var(--font-sans); color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ────────────────────────────────────────────────── */
    .app-shell {
      width: 100%; max-width: 480px; margin: 0 auto;
      min-height: 100dvh; min-height: 100vh;
      background: var(--paper-edge); position: relative;
    }
    .scroll {
      height: 100dvh; height: 100vh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 150px;
    }
    .scroll--nofooter { padding-bottom: 0; }

    /* ── HEADER ───────────────────────────────────────────────────── */
    .med-header {
      background: var(--navy-dark); color: var(--on-navy-fg);
      padding: max(env(safe-area-inset-top, 0px) + 16px, 24px) var(--s-10) var(--s-9);
      border-bottom: 1px solid var(--accent);
      position: sticky; top: 0; z-index: 20;
    }
    .med-header__top {
      display: flex; align-items: center; gap: var(--s-5);
      margin-bottom: var(--s-7);
    }
    .rx-badge {
      width: 24px; height: 24px;
      border: 1.5px solid var(--accent-bright);
      display: inline-grid; place-items: center;
      font-family: var(--font-serif); font-size: 13px;
      color: var(--accent-bright); flex-shrink: 0;
    }
    .rx-badge--confirm {
      width: 44px; height: 44px; border-radius: var(--r-full);
      border: 2px solid var(--state-ok); color: var(--state-ok); font-size: 22px;
    }
    .header-eyebrow {
      font: 600 9px/1.2 var(--font-sans);
      letter-spacing: .18em; text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .header-sync {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font: 400 11.5px/1 var(--font-mono); color: var(--on-navy-fg-dim);
    }
    .header-sync__dot {
      width: 6px; height: 6px; border-radius: var(--r-full); background: var(--state-ok);
    }
    .header-breadcrumb {
      margin-left: auto; font: 400 11.5px/1 var(--font-mono); color: var(--on-navy-fg-dim);
      background: none; border: none; cursor: pointer; padding: 4px 0;
    }
    .header-breadcrumb:active { opacity: .7; }
    .header-sub {
      font: 600 10px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim); margin-bottom: var(--s-2);
    }
    .header-title { font: 500 26px/1.1 var(--font-serif); color: var(--on-navy-fg); }
    .header-meta-strip {
      margin-top: var(--s-7); padding-top: var(--s-7);
      border-top: 1px solid var(--navy-light);
      display: flex; gap: var(--s-9);
    }
    .header-meta-item { display: flex; flex-direction: column; gap: 3px; }
    .header-meta-label {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .header-meta-val { font: 400 13px/1 var(--font-mono); color: var(--on-navy-fg); }

    /* ── SECTIONS ─────────────────────────────────────────────────── */
    .section { background: var(--paper); border-bottom: var(--rule-solid); }
    .section-head {
      display: flex; align-items: baseline; gap: var(--s-5);
      padding: var(--s-9) var(--s-9) var(--s-5);
      border-bottom: var(--rule-solid); background: var(--paper-edge);
    }
    .section-head__no {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--ink-dim); min-width: 20px;
    }
    .section-head__title { font: 600 15px/1.1 var(--font-serif); color: var(--ink); }
    .section-head__right {
      margin-left: auto; font: 600 9px/1.2 var(--font-sans);
      letter-spacing: .18em; text-transform: uppercase; color: var(--ink-dim);
    }

    /* ── ENTRY-CLASS BUTTON ───────────────────────────────────────── */
    .entry-class {
      width: 100%; display: grid; grid-template-columns: 44px 1fr auto;
      align-items: center; padding: var(--s-7) var(--s-9);
      background: var(--paper-2); border: none; border-bottom: var(--rule-solid);
      cursor: pointer; text-align: left; transition: background 120ms ease-out;
    }
    .entry-class:last-child { border-bottom: none; }
    .entry-class:hover  { background: var(--paper); }
    .entry-class:active { background: var(--paper-edge); }
    .entry-class:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .entry-class__code {
      width: 36px; height: 36px; display: inline-grid; place-items: center;
      background: var(--paper-2); border: 1px solid var(--paper-line);
      font: 600 15px/1 var(--font-sans); color: var(--ink);
    }
    .entry-class__body { display: flex; flex-direction: column; gap: 2px; padding: 0 var(--s-6); }
    .entry-class__name { font: 600 17px/1.2 var(--font-serif); color: var(--ink); }
    .entry-class__sub  { font: 400 11.5px/1.4 var(--font-sans); color: var(--ink-dim); }
    .entry-class__chev {
      font: 400 16px/1 var(--font-mono); color: var(--accent);
      transition: color 120ms ease-out;
    }
    .entry-class:hover .entry-class__chev { color: var(--accent-bright); }

    /* ── INTERVENTION ROW ─────────────────────────────────────────── */
    .intervention {
      display: grid; grid-template-columns: 48px 1fr auto;
      grid-template-rows: auto auto; column-gap: var(--s-6); row-gap: var(--s-2);
      padding: var(--s-7) var(--s-9); border-bottom: var(--rule-solid); background: var(--paper);
    }
    .intervention:last-child { border-bottom: none; }
    .intervention__code {
      grid-row: 1 / 3; display: flex; align-items: center; justify-content: center;
      font: 400 11px/1 var(--font-mono); color: var(--ink-dim); align-self: center;
    }
    .intervention__type  { font: 400 16px/1.35 var(--font-serif); color: var(--ink); }
    .intervention__value { font: 400 16px/1.35 var(--font-serif); color: var(--ink); text-align: right; }
    .intervention__admin { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); }
    .intervention__pill  { display: flex; justify-content: flex-end; }

    /* ── STATE PILL ───────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 7px; border-radius: var(--r-1);
      font: 400 10px/1 var(--font-mono); letter-spacing: .14em; background: #fff;
    }
    .pill::before { content: ''; width: 6px; height: 6px; border-radius: var(--r-full); }
    .pill--active   { color: var(--state-warn); border: 1px solid rgba(217,119,6,.33); }
    .pill--active::before   { background: var(--state-warn); }
    .pill--complete { color: var(--state-ok);   border: 1px solid rgba(34,197,94,.33); }
    .pill--complete::before { background: var(--state-ok); }
    .pill--pending  { color: var(--ink-dim);    border: 1px solid rgba(203,213,225,.5); }
    .pill--pending::before  { background: var(--state-pending); }

    /* ── OPTION ROW ───────────────────────────────────────────────── */
    .option-row {
      display: grid; grid-template-columns: 34px 1fr auto;
      column-gap: var(--s-7); align-items: center;
      padding: var(--s-7) var(--s-9); background: #fff; border-bottom: var(--rule-solid);
      border-left: 3px solid transparent; cursor: pointer;
      transition: background 160ms ease-out, border-left-color 160ms ease-out;
    }
    .option-row:last-child { border-bottom: none; }
    .option-row:hover { background: var(--paper-2); }
    .option-row[aria-selected="true"] { background: var(--accent-tint); border-left-color: var(--accent); }
    .option-row:focus-visible { border-left-color: var(--accent-bright); outline: none; }
    .radio-circle {
      width: 22px; height: 22px; border-radius: var(--r-full);
      border: 1.5px solid var(--paper-line); background: #fff;
      display: inline-grid; place-items: center; flex-shrink: 0;
      transition: all 160ms ease-out;
    }
    .option-row[aria-selected="true"] .radio-circle {
      border-color: var(--accent); background: var(--accent); color: #fff; font-size: 12px;
    }
    .option-row__body { display: flex; flex-direction: column; gap: 2px; }
    .option-row__name { font: 600 17px/1.2 var(--font-serif); color: var(--ink); }
    .option-row__sub  { font: 400 11.5px/1.4 var(--font-sans); color: var(--ink-dim); }
    .option-row__code { font: 400 11px/1 var(--font-mono); color: var(--ink-dim); }

    /* ── CHIPS ────────────────────────────────────────────────────── */
    .chips { display: flex; margin: var(--s-9); border: 1px solid var(--paper-line); }
    .chip {
      flex: 1 1 0; padding: var(--s-5) var(--s-5);
      text-align: center; font: 400 12px/1.3 var(--font-mono);
      background: #fff; color: var(--ink); border: none; cursor: pointer;
      transition: background 120ms ease-out;
    }
    .chips .chip + .chip { border-left: 1px solid var(--paper-line); }
    .chip:hover { background: var(--paper-2); }
    .chip[aria-pressed="true"] { background: var(--accent); color: #fff; }
    .chip:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: -2px; }

    /* ── FIELD GRID ───────────────────────────────────────────────── */
    .field-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      column-gap: var(--s-9); row-gap: var(--s-8); padding: var(--s-7) var(--s-9);
    }
    .field-grid--3 { grid-template-columns: 1fr 1fr 1fr; column-gap: var(--s-7); }
    .field-grid--1 { grid-template-columns: 1fr; }

    /* ── INPUT CELL ───────────────────────────────────────────────── */
    .cell { display: flex; flex-direction: column; min-width: 0; }
    .cell__label {
      font: 600 10px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--ink-dim);
    }
    .cell__value {
      margin-top: 4px; padding: 0 0 5px;
      border: none; border-bottom: var(--rule-dotted);
      background: transparent; font: 400 17px/1.2 var(--font-serif);
      color: var(--ink); outline: none; width: 100%;
    }
    .cell__value--mono { font: 400 13px/1.3 var(--font-mono); }
    .cell__value:focus { border-bottom: 1px solid var(--accent); }
    .cell__value[aria-invalid="true"] { border-bottom: 1px solid var(--state-err); color: var(--state-err); }
    .cell__value:disabled { color: var(--ink-dim); }
    .cell__hint { font: 400 10.5px/1.3 var(--font-mono); color: var(--ink-dim); margin-top: 3px; }

    /* ── SUPPLEMENT ROW ───────────────────────────────────────────── */
    .supplement-row {
      display: grid; grid-template-columns: 28px 1fr 28px;
      column-gap: var(--s-6); align-items: center;
      padding: var(--s-7) var(--s-9); background: #fff;
      border-bottom: var(--rule-solid); transition: background 120ms;
    }
    .supplement-row:last-child { border-bottom: none; }
    .supplement-row--checked { background: var(--paper-2); }
    .supplement-row--hold    { background: var(--paper-hold); }
    .supplement-check {
      width: 26px; height: 26px; display: inline-grid; place-items: center;
      border: 1.5px solid var(--paper-line); background: #fff; cursor: pointer;
      flex-shrink: 0; transition: all 120ms; font: 700 16px/1 var(--font-sans);
    }
    .supplement-check[aria-checked="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
    .supplement-check:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: 2px; }
    .supplement-row__body { display: flex; flex-direction: column; gap: 2px; }
    .supplement-row__name { font: 400 16px/1.35 var(--font-serif); color: var(--ink); }
    .supplement-row__meta { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); }
    .supplement-row__idx  { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); text-align: right; }
    .hold-tag {
      font: 400 9px/1 var(--font-mono); letter-spacing: .14em; text-transform: uppercase;
      color: var(--state-warn); border: 1px solid rgba(217,119,6,.33);
      padding: 1px 5px; display: inline-block; margin-left: 6px;
    }

    /* ── ANNOTATION ───────────────────────────────────────────────── */
    .annotation-wrap { padding: var(--s-9); }
    .annotation {
      border-top: var(--rule-dashed); border-bottom: var(--rule-dashed);
      padding: var(--s-6) 0; width: 100%; background: transparent;
      resize: none; outline: none; font: italic 400 13.5px/1.5 var(--font-serif);
      color: var(--ink-dim); display: block; min-height: 72px;
    }
    .annotation:focus { color: var(--ink); }
    .annotation-meta {
      margin-top: 8px; display: flex; justify-content: space-between;
      font: 400 10.5px/1.3 var(--font-mono); color: var(--ink-dim);
    }

    /* ── PROGRESS BAR ─────────────────────────────────────────────── */
    .progress-wrap { padding: 0 var(--s-9) var(--s-7); }
    .progress {
      height: 6px; background: var(--paper-edge);
      border: 1px solid var(--paper-line); position: relative;
    }
    .progress__fill {
      position: absolute; inset: 0 auto 0 0;
      background: var(--state-warn); width: var(--progress, 0%);
      transition: width 240ms cubic-bezier(.2,0,0,1);
    }
    .progress__label {
      font: 400 10px/1 var(--font-mono); color: var(--ink-dim);
      margin-top: 5px; text-align: right;
    }

    /* ── SIGN-AND-FILE FOOTER ─────────────────────────────────────── */
    .sign-and-file {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: 0; width: 100%; max-width: 480px;
      background: var(--navy-dark); border-top: 1px solid var(--accent);
      padding: var(--s-7) var(--s-9) calc(var(--s-8) + env(safe-area-inset-bottom, 0px));
      display: flex; flex-direction: column; gap: var(--s-5); z-index: 30;
    }
    .saf-meta { display: flex; justify-content: space-between; align-items: flex-end; }
    .saf-sig { display: flex; flex-direction: column; gap: 3px; }
    .saf-sig__label {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .saf-sig__name {
      font: 400 13px/1.3 var(--font-serif); color: var(--on-navy-fg);
      border-bottom: 1px solid var(--ink-muted); padding-bottom: 3px; width: 140px;
    }
    .saf-time { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
    .saf-time__label {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .saf-time__val { font: 400 13px/1 var(--font-mono); color: var(--on-navy-fg); }

    /* ── BUTTONS ──────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 15px var(--s-8);
      background: var(--accent-bright); color: #fff;
      border: none; border-radius: var(--r-1);
      font: 700 14px/1 var(--font-sans); letter-spacing: .22em; text-transform: uppercase;
      cursor: pointer; transition: background 120ms ease-out, transform 80ms ease-out;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover  { background: #4a9fe1; }
    .btn-primary:active { background: var(--accent); transform: translateY(1px); }
    .btn-primary:focus-visible { outline: 2px solid #fff; outline-offset: -4px; }
    .btn-primary:disabled { background: var(--ink-muted); cursor: not-allowed; transform: none; }
    .btn-secondary {
      width: 100%; padding: 14px var(--s-6);
      background: transparent; color: var(--on-navy-fg);
      border: 1px solid var(--ink-muted); border-radius: var(--r-1);
      font: 600 11.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase;
      cursor: pointer; transition: background 120ms;
    }
    .btn-secondary:hover  { background: rgba(255,255,255,.06); }
    .btn-secondary:active { opacity: .7; }

    /* ── ERROR BAND ───────────────────────────────────────────────── */
    .err-band {
      font: 400 11.5px/1.3 var(--font-mono); color: var(--state-err);
      background: var(--paper-hold); border-top: 1px solid var(--state-err);
      padding: var(--s-5) var(--s-9); display: none;
    }
    .err-band.show { display: block; }

    /* ── AUDIT FOOTER ─────────────────────────────────────────────── */
    .audit-footer {
      background: var(--paper-edge);
      padding: var(--s-8) var(--s-9) var(--s-14);
      font: 400 10.5px/1.8 var(--font-mono); color: var(--ink-dim);
    }
    .audit-footer .ok { color: var(--state-ok); }

    /* ── SPINNER ──────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 700ms linear infinite; }

    /* ── NUMBER ROW ───────────────────────────────────────────────── */
    .num-row {
      display: flex; align-items: center; gap: var(--s-6);
      padding: var(--s-7) var(--s-9);
    }
    .num-btn {
      width: 40px; height: 40px; border: 1px solid var(--paper-line);
      background: var(--paper-2); color: var(--ink); font-size: 22px;
      cursor: pointer; display: inline-grid; place-items: center;
      border-radius: var(--r-1); flex-shrink: 0; transition: background 120ms;
    }
    .num-btn:hover  { background: var(--paper-edge); }
    .num-btn:active { background: var(--paper-line); }
    .num-val { flex: 1; text-align: center; font: 500 30px/1 var(--font-serif); color: var(--ink); }
    .num-unit { font: 400 11px/1 var(--font-mono); color: var(--ink-dim); }

    /* ── FAST ACTIVE BANNER ───────────────────────────────────────── */
    .fast-banner {
      background: var(--navy-mid); border-bottom: 1px solid var(--accent);
      padding: var(--s-7) var(--s-9); display: flex; align-items: center; gap: var(--s-6);
    }
    .fast-banner__code { font: 400 11px/1 var(--font-mono); color: var(--on-navy-fg-dim); min-width: 32px; }
    .fast-banner__body { flex: 1; min-width: 0; }
    .fast-banner__type { font: 600 14px/1.2 var(--font-serif); color: var(--on-navy-fg); }
    .fast-banner__timer { font: 400 13px/1 var(--font-mono); color: var(--state-warn); margin-top: 2px; }
    .fast-banner__end {
      background: none; border: 1px solid rgba(220,38,38,.5); border-radius: var(--r-1);
      color: #fca5a5; font: 600 10px/1 var(--font-sans);
      letter-spacing: .14em; text-transform: uppercase;
      padding: 6px 10px; cursor: pointer; flex-shrink: 0; transition: background 120ms;
    }
    .fast-banner__end:hover { background: rgba(220,38,38,.15); }

    /* ── CONFIRM RECORD ROW ───────────────────────────────────────── */
    .confirm-row {
      display: grid; grid-template-columns: 100px 1fr;
      border-bottom: var(--rule-solid); padding: var(--s-6) var(--s-9);
    }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-row__key { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); }
    .confirm-row__val { font: 400 16px/1.35 var(--font-serif); color: var(--ink); word-break: break-word; }

    /* ── TAB STRIP ────────────────────────────────────────────────── */
    .tab-strip {
      display: flex; overflow-x: auto; padding: var(--s-5) var(--s-7) 0;
      background: var(--paper-edge); border-bottom: var(--rule-solid);

    .tab-strip::-webkit-scrollbar { display: none; }
    .tab-chip {
      padding: var(--s-5) var(--s-7); font: 400 11.5px/1 var(--font-mono);
      background: transparent; color: var(--ink-dim);
      border: none; border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: color 120ms, border-color 120ms;

    .tab-chip[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--accent); }

    /* ── MISC ─────────────────────────────────────────────────────── */
    .empty-state {
      padding: var(--s-14) var(--s-9); text-align: center;
      font: 400 13px/1.6 var(--font-mono); color: var(--ink-dim);

    /* ── REDUCED MOTION ───────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0ms !important; animation-duration: 0ms !important;
      }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="scroll" id="scroll">
    <div id="app"></div>
  </div>
  <div class="sign-and-file" id="saf" style="display:none"></div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SB_URL = 'https://omrvqkefmlptsqpbmsxv.supabase.co';
const SB_KEY = 'sb_publishable_GxibaKni7-in3KQLCz1EgQ_VRIli3Qg';

// ── SUPPLEMENTS ────────────────────────────────────────────────────────────
const SUPS = [
  { name:'Tirzepatide',           dose:'2.0mg',     class:'GLP-1/GIP',  route:'inj', hold:true  },
  { name:'Repatha',               dose:'23.5mg',    class:'PCSK9 mAb',  route:'inj', hold:false },
  { name:'Vitamin D3',            dose:'10,000 IU', class:'vitamin',    route:'po',  hold:false },
  { name:'Nicotinamide Riboside', dose:'1g',        class:'NAD+ prec.', route:'po',  hold:false },
  { name:'Magnesium Glycinate',   dose:'360mg',     class:'mineral',    route:'po',  hold:false },
  { name:'Omega-3',               dose:'4g',        class:'EPA/DHA',    route:'po',  hold:false },
  { name:'Creatine Monohydrate',  dose:'20g',       class:'ergogenic',  route:'po',  hold:false },
  { name:'Glycine',               dose:'3g',        class:'amino',      route:'po',  hold:false },
  { name:'GHK-Cu',                dose:'2.0mg',     class:'peptide',    route:'sc',  hold:false },
];

// ── ENTRY META ─────────────────────────────────────────────────────────────
const EMETA = {
  fast:       { code:'FA', label:'Fast',             sub:'fasting window log'    },
  supplement: { code:'SU', label:'Supplements',      sub:'daily stack admin.'    },
  red_light:  { code:'RL', label:'Red Light',        sub:'photobiomodulation'    },
  sauna:      { code:'SA', label:'Sauna',            sub:'thermal recovery'      },
  alcohol:    { code:'AL', label:'Alcohol',          sub:'consumption event'     },
  massage:    { code:'MA', label:'Massage',          sub:'soft tissue recovery'  },
  flight:     { code:'FL', label:'Overnight Flight', sub:'sleep disruption log'  },
  timezone:   { code:'TZ', label:'Timezone Change',  sub:'circadian context'     },
  note:       { code:'NT', label:'Note',             sub:'free-text observation' },
};

// ── FAST PROTOCOLS ─────────────────────────────────────────────────────────
const PROTOCOLS = [
  { code:'P-01', label:'16:8', sub:'16 h fast · 8 h eat',    window_hours:16, eat_hours:8 },
  { code:'P-02', label:'18:6', sub:'18 h fast · 6 h eat',    window_hours:18, eat_hours:6 },
  { code:'P-03', label:'20:4', sub:'20 h fast · 4 h eat',    window_hours:20, eat_hours:4 },
  { code:'P-04', label:'40hr', sub:'extended fast · 2 days', window_hours:40, eat_hours:0 },
  { code:'P-05', label:'OMAD', sub:'one meal a day',          window_hours:23, eat_hours:1 },
];

// ── STATE ──────────────────────────────────────────────────────────────────
let db           = null;
let fastTick     = null;
let safClockTick = null;
let currentSubmit = null;
let currentType   = null;
let confirmEntry  = null;

// ── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (SB_URL && !SB_URL.includes('YOUR_')) {
    db = supabase.createClient(SB_URL, SB_KEY);
  }
  window.addEventListener('hashchange', render);
  if (!location.hash || location.hash === '#') location.hash = '#home';
  else render();
});

// ── ROUTER ─────────────────────────────────────────────────────────────────
function navigate(hash) { location.hash = hash; }

function render() {
  const hash = location.hash || '#home';
  const scroll = document.getElementById('scroll');
  hideSaf();

  if (hash === '#home' || hash === '#') {
    scroll.classList.add('scroll--nofooter');
    renderHome();
  } else if (hash === '#confirm') {
    scroll.classList.add('scroll--nofooter');
    renderConfirm();
  } else if (hash.startsWith('#log/')) {
    scroll.classList.remove('scroll--nofooter');
    renderForm(hash.replace('#log/', ''));
  } else {
    scroll.classList.add('scroll--nofooter');
    renderHome();
  }
  document.getElementById('scroll').scrollTop = 0;
}

// ── HOME SCREEN ────────────────────────────────────────────────────────────
function renderHome() {
  clearInterval(fastTick);
  const app = document.getElementById('app');
  const now = new Date();
  const activeFast = getActiveFast();

  app.innerHTML = `
    <div class="med-header">
      <div class="med-header__top">
        <span class="rx-badge">&#8478;</span>
        <span class="header-eyebrow">HEALTH.DB &middot; JOURNAL</span>
        <span class="header-sync"><span class="header-sync__dot"></span>LIVE</span>
      </div>
      <div class="header-sub">${fmtHeaderDate(now)}</div>
      <div class="header-title">Today's Record</div>
    </div>

    ${activeFast ? `
    <div class="fast-banner" id="fast-banner">
      <span class="fast-banner__code">FA</span>
      <div class="fast-banner__body">
        <div class="fast-banner__type">${activeFast.type} &middot; ACTIVE FAST</div>
        <div class="fast-banner__timer" id="banner-timer">&#8212;</div>
      </div>
      <button class="fast-banner__end" onclick="endFast()">END FAST</button>
    </div>` : ''}

    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;01</span>
        <span class="section-head__title">Today's Log</span>
        <span class="section-head__right" id="today-count">&#8212;</span>
      </div>
      <div id="today-entries"><div class="empty-state">loading&hellip;</div></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;02</span>
        <span class="section-head__title">Log Entry</span>
        <span class="section-head__right">tap to open</span>
      </div>
      ${Object.entries(EMETA).map(([type, m]) => `
        <button class="entry-class" onclick="navigate('#log/${type}')">
          <span class="entry-class__code">${m.code}</span>
          <span class="entry-class__body">
            <span class="entry-class__name">${m.label}</span>
            <span class="entry-class__sub">${m.sub}</span>
          </span>
          <span class="entry-class__chev">&rarr;</span>
        </button>`).join('')}
    </div>

    <div class="audit-footer">
      &middot; subject 01 &middot; health.db<br>
      &middot; journal v3 &middot; medical record ui<br>
      <span class="ok">+</span> data writes to supabase in real-time
    </div>`;

  loadTodayEntries();
  if (activeFast) startFastBannerTimer(activeFast);
}

function startFastBannerTimer(fast) {
  clearInterval(fastTick);
  function update() {
    const el = document.getElementById('banner-timer');
    if (!el) { clearInterval(fastTick); return; }
    const ms  = Date.now() - new Date(fast.startedAt).getTime();
    const pct = Math.min(Math.round((ms / (fast.window_hours * 3600000)) * 100), 100);
    el.textContent = fmtDur(ms) + ' · ' + pct + '%';
  }
  update();
  fastTick = setInterval(update, 1000);
}

async function loadTodayEntries() {
  const el      = document.getElementById('today-entries');
  const countEl = document.getElementById('today-count');
  if (!el) return;
  if (!db) { el.innerHTML = '<div class="empty-state">configure supabase</div>'; return; }
  const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
  const { data, error } = await db.from('journal_entries')
    .select('*').gte('started_at', todayStart.toISOString())
    .order('started_at', { ascending: false });
  if (error || !data || !data.length) {
    el.innerHTML = '<div class="empty-state">no entries logged today</div>';
    if (countEl) countEl.textContent = '0 entries';
    return;
  }
  if (countEl) countEl.textContent = data.length + (data.length === 1 ? ' entry' : ' entries');
  el.innerHTML = data.map(e => {
    const m      = EMETA[e.entry_type] || { code: e.entry_type.substring(0,2).toUpperCase(), label: e.entry_type };
    const meta   = e.metadata || {};
    const detail = entryDetail(e.entry_type, meta, e.notes);
    const status = (e.entry_type === 'fast' && !e.ended_at) ? 'active' : 'complete';
    return `<div class="intervention">
      <span class="intervention__code">${m.code}</span>
      <span class="intervention__type">${m.label}</span>
      <span class="intervention__value">${ago(new Date(e.started_at))}</span>
      <span></span>
      <span class="intervention__admin">${detail}</span>
      <span class="intervention__pill">
        <span class="pill pill--${status}">${status === 'active' ? 'IN PROGRESS' : 'COMPLETE'}</span>
      </span>
    </div>`;
  }).join('');
}

function entryDetail(type, meta, notes) {
  switch (type) {
    case 'fast':       return (meta.fast_type || meta.protocol_label || '') + (notes ? ' · ' + notes.substring(0,30) : '');
    case 'supplement': return (meta.taken || []).length + ' supplements logged';
    case 'red_light':  return (meta.duration_min || '') + ' min' + (meta.zone || meta.area ? ' · ' + (meta.zone || meta.area) : '');
    case 'sauna':      return (meta.duration_min || '') + ' min · ' + (meta.type || meta.heat_type || '');
    case 'alcohol':    return (meta.drinks || '') + ' drink' + ((meta.drinks > 1) ? 's' : '') + (meta.type ? ' · ' + meta.type : '');
    case 'massage':    return (meta.duration_min || '') + ' min · ' + (meta.type || '');
    case 'flight':     return (meta.from || '') + ' → ' + (meta.to || '');
    case 'timezone':   return (meta.from_tz || '') + ' → ' + (meta.to_tz || '');
    case 'note':       return (meta.text || notes || '').substring(0, 50);
    default:           return notes || '';
  }
}

// ── FORM DISPATCHER ────────────────────────────────────────────────────────
function renderForm(type) {
  currentType = type;
  const meta = EMETA[type];
  if (!meta) { navigate('#home'); return; }
  switch (type) {
    case 'fast':       buildFastForm(meta);       break;
    case 'supplement': buildSupplementForm(meta); break;
    case 'sauna':      buildSaunaForm(meta);      break;
    case 'red_light':  buildRedLightForm(meta);   break;
    case 'alcohol':    buildAlcoholForm(meta);    break;
    case 'massage':    buildMassageForm(meta);    break;
    case 'flight':     buildFlightForm(meta);     break;
    case 'timezone':   buildTimezoneForm(meta);   break;
    case 'note':       buildNoteForm(meta);       break;
    default: navigate('#home');
  }
  showSaf(type === 'fast' ? 'START FAST · SIGN &amp; FILE' : 'LOG IT · SIGN &amp; FILE');
}

// ── FAST FORM ──────────────────────────────────────────────────────────────
function buildFastForm(meta) {
  const app  = document.getElementById('app');
  const nowV = toLocalDatetimeInput(new Date());
  app.innerHTML = `
    ${formHeader(meta, '01', 'Start fast')}
    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;01</span>
        <span class="section-head__title">Protocol</span>
        <span class="section-head__right">single-select</span>
      </div>
      <div role="radiogroup" id="protocol-group">
        ${PROTOCOLS.map((p, i) => `
          <div class="option-row" role="radio" aria-selected="${i === 0}"
               tabindex="${i === 0 ? 0 : -1}" onclick="selectOption(this,'protocol-group')"
               data-code="${p.code}" data-window="${p.window_hours}" data-eat="${p.eat_hours}">
            <span class="radio-circle">${i === 0 ? '●' : ''}</span>
            <div class="option-row__body">
              <span class="option-row__name">${p.label}</span>
              <span class="option-row__sub">${p.sub}</span>
            </div>
            <span class="option-row__code">${p.code}</span>
          </div>`).join('')}
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;02</span>
        <span class="section-head__title">Window</span>
      </div>
      <div class="field-grid">
        <label class="cell">
          <span class="cell__label">STARTED AT</span>
          <input class="cell__value cell__value--mono" id="f-fast-start" type="datetime-local" value="${nowV}">
          <span class="cell__hint">default: now</span>
        </label>
        <label class="cell">
          <span class="cell__label">LAST MEAL AT</span>
          <input class="cell__value cell__value--mono" id="f-fast-lastmeal" type="datetime-local">
          <span class="cell__hint">optional</span>
        </label>
        <label class="cell">
          <span class="cell__label">EXPECTED CLOSE</span>
          <input class="cell__value cell__value--mono" id="f-fast-close" type="datetime-local" disabled>
          <span class="cell__hint">auto-derived</span>
        </label>
        <label class="cell">
          <span class="cell__label">ELAPSED</span>
          <input class="cell__value cell__value--mono" id="f-fast-elapsed" disabled value="&#8212;">
          <span class="cell__hint">live</span>
        </label>
      </div>
      <div class="progress-wrap">
        <div class="progress"><div class="progress__fill" id="fast-prog" style="--progress:0%"></div></div>
        <div class="progress__label" id="fast-prog-label">0%</div>
      </div>
    </div>
    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;03</span>
        <span class="section-head__title">Annotation</span>
        <span class="section-head__right">optional</span>
      </div>
      <div class="annotation-wrap">
        <textarea class="annotation" id="f-fast-note" maxlength="500" placeholder="Notes&hellip;"></textarea>
        <div class="annotation-meta"><span id="f-fast-nc">0 / 500 char</span></div>
      </div>
    </div>`;
  document.getElementById('f-fast-start').addEventListener('change', updateFastDerived);
  document.querySelectorAll('#protocol-group .option-row').forEach(r => r.addEventListener('click', updateFastDerived));
  document.getElementById('f-fast-note').addEventListener('input', function() {
    document.getElementById('f-fast-nc').textContent = this.value.length + ' / 500 char';
  });
  updateFastDerived();
  currentSubmit = submitFast;
}

function updateFastDerived() {
  const sel     = document.querySelector('#protocol-group [aria-selected="true"]');
  const windowH = sel ? parseInt(sel.dataset.window) : 16;
  const startV  = document.getElementById('f-fast-start') && document.getElementById('f-fast-start').value;
  if (!startV) return;
  const start   = new Date(startV);
  const close   = new Date(start.getTime() + windowH * 3600000);
  const closeEl = document.getElementById('f-fast-close');
  if (closeEl) closeEl.value = toLocalDatetimeInput(close);
  const elapsed = Date.now() - start.getTime();
  if (elapsed > 0) {
    const elEl = document.getElementById('f-fast-elapsed');
    if (elEl) elEl.value = fmtDur(elapsed);
    const pct = Math.min(Math.round((elapsed / (windowH * 3600000)) * 100), 100);
    const pf  = document.getElementById('fast-prog');
    const pl  = document.getElementById('fast-prog-label');
    if (pf) pf.style.setProperty('--progress', pct + '%');
    if (pl) pl.textContent = pct + '%';
  }
}

async function submitFast() {
  const sel = document.querySelector('#protocol-group [aria-selected="true"]');
  if (!sel) { showErr('Select a protocol'); return; }
  const protocol  = PROTOCOLS.find(function(p) { return p.code === sel.dataset.code; }) || PROTOCOLS[0];
  const startV    = document.getElementById('f-fast-start') && document.getElementById('f-fast-start').value;
  if (!startV) { showErr('Start time required'); return; }
  const startedAt = new Date(startV).toISOString();
  const lastMealEl = document.getElementById('f-fast-lastmeal');
  const lastMealV  = lastMealEl ? lastMealEl.value : '';
  const noteEl     = document.getElementById('f-fast-note');
  const note       = noteEl ? noteEl.value.trim() || null : null;
  const expectedClose = new Date(new Date(startV).getTime() + protocol.window_hours * 3600000).toISOString();
  const metadata = {
    fast_type: protocol.label, protocol_code: protocol.code,
    protocol_label: protocol.label, window_hours: protocol.window_hours,
    eat_hours: protocol.eat_hours,
    last_meal_at: lastMealV ? new Date(lastMealV).toISOString() : null,
    expected_close_at: expectedClose,
  };
  setBtnLoading(true); clearErr();
  if (!db) { showErr('Supabase not configured'); setBtnLoading(false); return; }
  const result = await db.from('journal_entries').insert({
    entry_type: 'fast', started_at: startedAt, ended_at: null, notes: note, metadata: metadata,
  }).select('*').single();
  setBtnLoading(false);
  if (result.error) { showErr(result.error.message || 'could not write entry'); autoHideErr(6000); return; }
  saveActiveFast({ type: protocol.label, startedAt: startedAt, id: result.data.id, window_hours: protocol.window_hours });
  confirmEntry = result.data;
  navigate('#confirm');
}

// ── SUPPLEMENT FORM ────────────────────────────────────────────────────────
function buildSupplementForm(meta) {
  const app   = document.getElementById('app');
  const doses = getStoredDoses();
  app.innerHTML = `
    ${formHeader(meta, '02', "Today's stack",
      '<span id="sup-count">0</span> / ' + SUPS.length + ' selected')}
    <div class="tab-strip" id="time-tabs">
      ${['Now','07:00','12:00','18:00','Custom'].map(function(t, i) {
        return '<button class="tab-chip" aria-selected="' + (i === 0) + '" onclick="selectTab(this,\'time-tabs\')" data-time="' + t + '">' + t + '</button>';
      }).join('')}
    </div>
    <div id="custom-time-wrap" style="display:none" class="section-pad">
      <label class="cell">
        <span class="cell__label">TAKEN AT</span>
        <input class="cell__value cell__value--mono" id="f-sup-custom" type="datetime-local" value="${toLocalDatetimeInput(new Date())}">
      </label>
    </div>
    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;01</span>
        <span class="section-head__title">Current stack &middot; check administered</span>
        <span class="section-head__right">${SUPS.length} items</span>
      </div>
      ${SUPS.map(function(s, i) {
        var d = doses[s.name] || s.dose;
        return '<div class="supplement-row' + (s.hold ? ' supplement-row--hold' : '') + '" id="sup-row-' + i + '">' +
          '<button class="supplement-check" role="checkbox" aria-checked="false" id="sup-chk-' + i + '" onclick="toggleSup(' + i + ')"></button>' +
          '<div class="supplement-row__body">' +
          '<span class="supplement-row__name">' + s.name + (s.hold ? '<span class="hold-tag">HOLD</span>' : '') + '</span>' +
          '<span class="supplement-row__meta">' + s.class + ' · ' + d + ' · ' + s.route + '</span>' +
          '</div>' +
          '<span class="supplement-row__idx">' + String(i + 1).padStart(2, '0') + '</span>' +
          '</div>';
      }).join('')}
    </div>
    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;02</span>
        <span class="section-head__title">Annotation</span>
        <span class="section-head__right">optional</span>
      </div>
      <div class="annotation-wrap">
        <textarea class="annotation" id="f-sup-note" maxlength="500" placeholder="Notes&hellip;"></textarea>
        <div class="annotation-meta"><span id="f-sup-nc">0 / 500 char</span></div>
      </div>
    </div>`;
  document.getElementById('f-sup-note').addEventListener('input', function() {
    document.getElementById('f-sup-nc').textContent = this.value.length + ' / 500 char';
  });
  currentSubmit = submitSupplement;
}

function toggleSup(i) {
  var chk     = document.getElementById('sup-chk-' + i);
  var row     = document.getElementById('sup-row-' + i);
  var checked = chk.getAttribute('aria-checked') === 'true';
  chk.setAttribute('aria-checked', String(!checked));
  chk.textContent = !checked ? '✓' : '';
  row.classList.toggle('supplement-row--checked', !checked);
  var count = document.querySelectorAll('.supplement-check[aria-checked="true"]').length;
  var el    = document.getElementById('sup-count');
  if (el) el.textContent = count;
}

function selectTab(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .tab-chip').forEach(function(t) { t.setAttribute('aria-selected', 'false'); });
  el.setAttribute('aria-selected', 'true');
  var wrap = document.getElementById('custom-time-wrap');
  if (wrap) wrap.style.display = el.dataset.time === 'Custom' ? '' : 'none';
}

async function submitSupplement() {
  var taken = [], skipped = [];
  SUPS.forEach(function(s, i) {
    var chk = document.getElementById('sup-chk-' + i);
    if (chk && chk.getAttribute('aria-checked') === 'true') {
      taken.push({ supplement_id: i + 1, name: s.name, dose: s.dose });
    } else {
      skipped.push({ supplement_id: i + 1, name: s.name, reason: s.hold ? 'hold' : 'not taken' });
    }
  });
  if (!taken.length) { showErr('Select at least one supplement'); return; }
  var activeTabEl = document.querySelector('#time-tabs [aria-selected="true"]');
  var activeTab   = activeTabEl ? activeTabEl.dataset.time : 'Now';
  var takenAt = new Date().toISOString();
  if (activeTab !== 'Now' && activeTab !== 'Custom') {
    var parts = activeTab.split(':').map(Number);
    var d = new Date(); d.setHours(parts[0], parts[1], 0, 0); takenAt = d.toISOString();
  } else if (activeTab === 'Custom') {
    var cv = document.getElementById('f-sup-custom');
    if (cv && cv.value) takenAt = new Date(cv.value).toISOString();
  }
  var noteEl = document.getElementById('f-sup-note');
  var note   = noteEl ? noteEl.value.trim() || null : null;
  saveDoses(taken.map(function(t) { return { name: t.name, dose: t.dose }; }));
  var metadata = {
    taken:       taken.map(function(t) { return { name: t.name, dose: t.dose }; }),
    taken_full:  taken, skipped: skipped,
    preset_time: activeTab.toLowerCase(), count: taken.length, of: SUPS.length,
  };
  await writeEntry('supplement', takenAt, takenAt, note, metadata);
}

// ── SAUNA FORM ─────────────────────────────────────────────────────────────
function buildSaunaForm(meta) {
  var app  = document.getElementById('app');
  var nowV = toLocalDatetimeInput(new Date());
  app.innerHTML =

// ── CORE WRITE ─────────────────────────────────────────────────────────────
async function writeEntry(type, startedAt, endedAt, notes, metadata) {
  setBtnLoading(true); clearErr();
  if (!db) { showErr('Supabase not configured'); setBtnLoading(false); return; }
  var result = await db.from('journal_entries').insert({
    entry_type: type, started_at: startedAt,
    ended_at: endedAt || null, notes: notes || null, metadata: metadata,
  }).select('*').single();
  setBtnLoading(false);
  if (result.error) { showErr(result.error.message || 'could not write entry — retry'); autoHideErr(6000); return; }
  confirmEntry = result.data;
  navigate('#confirm');
}

async function undoEntry(id, intervalId) {
  clearInterval(intervalId);
  if (db && id) await db.from('journal_entries').delete().eq('id', id);
  confirmEntry = null;
  navigate('#home');
}

// ── FASTING PERSISTENCE ────────────────────────────────────────────────────
function getActiveFast()   { try { return JSON.parse(localStorage.getItem('jf')); } catch(e) { return null; } }
function saveActiveFast(o) { localStorage.setItem('jf', JSON.stringify(o)); }
function clearActiveFast() { localStorage.removeItem('jf'); }

async function endFast() {
  var f = getActiveFast();
  if (!f) return;
  var endedAt = new Date().toISOString();
  if (db && f.id) await db.from('journal_entries').update({ ended_at: endedAt }).eq('id', f.id);
  clearActiveFast();
  clearInterval(fastTick);
  navigate('#home');
}

    '<div class="saf-time"><span class="saf-time__label">At</span><span class="saf-time__val" id="saf-clock">' + timeStr + '</span></div>' +
    '</div>' +
    '<div class="err-band" id="err-band"></div>' +
    '<button class="btn-primary" id="saf-btn" onclick="submitCurrent()">' + btnLabel + '</button>';
  clearInterval(safClockTick);
  safClockTick = setInterval(function() {
    var el = document.getElementById('saf-clock');
    if (el) {
      el.textContent = new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false });
    } else {
      clearInterval(safClockTick);
    }
  }, 1000);
}

function hideSaf() {
  var saf = document.getElementById('saf');
  if (saf) saf.style.display = 'none';
  clearInterval(safClockTick);
}

function submitCurrent() { if (typeof currentSubmit === 'function') currentSubmit(); }

function setBtnLoading(loading) {
  var btn = document.getElementById('saf-btn');
  if (!btn) return;
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = 'FILING&hellip; <svg class="spinner" viewBox="0 0 14 14" width="14" height="14" aria-hidden="true"><circle cx="7" cy="7" r="5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/><path d="M7 2 a5 5 0 0 1 5 5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>';
  } else {
    btn.disabled = false;
    btn.innerHTML = currentType === 'fast' ? 'START FAST · SIGN &amp; FILE' : 'LOG IT · SIGN &amp; FILE';
  }
}

function showErr(msg) {
  var el = document.getElementById('err-band');
  if (el) { el.textContent = '⨯ ERR · ' + msg; el.classList.add('show'); el.style.display = 'block'; }
}
function clearErr() {
  var el = document.getElementById('err-band');
  if (el) { el.textContent = ''; el.classList.remove('show'); el.style.display = 'none'; }
}
function autoHideErr(ms) { setTimeout(clearErr, ms); }

// ── FORM HELPERS ───────────────────────────────────────────────────────────
function formHeader(meta, formNo, title, bigNum) {
  return '<div class="med-header">' +
    '<div class="med-header__top">' +
    '<span class="rx-badge">&#8478;</span>' +
    '<span class="header-eyebrow">HEALTH.DB &middot; ' + meta.code + ' &middot; FORM ' + formNo + '</span>' +
    '<button class="header-breadcrumb" onclick="navigate(\'#home\')">&lsaquo; Today</button>' +
    '</div>' +
    '<div class="header-sub">' + fmtHeaderDate(new Date()) + '</div>' +
    '<div class="header-title">' + title + '</div>' +
    (bigNum ? '<div class="header-meta-strip"><div class="header-meta-item"><span class="header-meta-label">' + meta.label.toUpperCase() + '</span><span class="header-meta-val">' + bigNum + '</span></div></div>' : '') +
    '</div>';
}

function selectOption(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .option-row').forEach(function(r) {
    r.setAttribute('aria-selected', 'false');
    r.querySelector('.radio-circle').textContent = '';
  });
  el.setAttribute('aria-selected', 'true');
  el.querySelector('.radio-circle').textContent = '●';
}

function selectChip(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .chip').forEach(function(c) { c.setAttribute('aria-pressed', 'false'); });
  el.setAttribute('aria-pressed', 'true');
}

function adj(id, delta, min) {
  if (min === undefined) min = 0;
  var el = document.getElementById(id);
  if (el) el.textContent = Math.max(min, (parseInt(el.textContent) || 0) + delta);
}

// ── DOSE STORAGE ───────────────────────────────────────────────────────────
function getStoredDoses() {
  try { return JSON.parse(localStorage.getItem('sup_doses') || '{}'); } catch(e) { return {}; }
}
function saveDoses(taken) {
  var stored = getStoredDoses();
  taken.forEach(function(item) { if (item.dose) stored[item.name] = item.dose; });
  localStorage.setItem('sup_doses', JSON.stringify(stored));
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); submitCurrent(); }
  if (e.key === 'Escape' && location.hash !== '#home') navigate('#home');
});

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmtHeaderDate(d) {
  return d.toLocaleDateString('en-US', { year:'numeric', month:'2-digit', day:'2-digit' }) +
    ' · ' + d.toLocaleDateString('en-US', { weekday:'long' });
}
function fmtDur(ms) {
  var h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
  return pad(h) + ':' + pad(m) + ':' + pad(s);
}
function pad(n) { return String(n).padStart(2, '0'); }
function ago(d) {
  var diff = Date.now() - d;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function toLocalDatetimeInput(d) {
  var p = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
}

// ── SERVICE WORKER ─────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
