<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Health Journal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN TOKENS ──────────────────────────────────────────────── */
    :root {
      --navy-dark:  #0d1b2a;
      --navy-mid:   #1b2d45;
      --navy-light: #243447;
      --navy-edge:  #0a1623;
      --accent:        #2a6496;
      --accent-bright: #3a8fd1;
      --accent-tint:   #eef4f9;
      --paper:      #f4f1ea;
      --paper-2:    #fbf8f1;
      --paper-edge: #ece7dc;
      --paper-line: #d6cfbf;
      --paper-hold: #f7eee0;
      --ink:        #1e293b;
      --ink-dim:    #5b6776;
      --ink-muted:  #94a3b8;
      --on-navy-fg:     #e6edf3;
      --on-navy-fg-dim: #94a3b8;
      --state-ok:      #22c55e;
      --state-warn:    #d97706;
      --state-err:     #dc2626;
      --state-pending: #cbd5e1;
      --confirm-bg: #eef7ee;
      --s-1:2px; --s-2:4px; --s-3:6px; --s-4:8px; --s-5:10px;
      --s-6:12px; --s-7:14px; --s-8:16px; --s-9:18px; --s-10:20px;
      --s-11:24px; --s-12:28px; --s-13:32px; --s-14:40px;
      --bw-hair:1px; --bw-rule:1.5px; --bw-emph:3px;
      --r-0:0; --r-1:2px; --r-full:9999px;
      --rule-solid:  1px solid var(--paper-line);
      --rule-dashed: 1px dashed var(--paper-line);
      --rule-dotted: 1px dotted var(--paper-line);
      --shadow-frame: 0 30px 80px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.35);
      --font-sans:  'Inter', Arial, system-ui, sans-serif;
      --font-serif: Georgia, 'Noto Serif', serif;
      --font-mono:  'JetBrains Mono', 'Roboto Mono', ui-monospace, monospace;
    }

    /* ── RESET ────────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      height: 100%; background: var(--navy-edge);
      font-family: var(--font-sans); color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── APP SHELL ────────────────────────────────────────────────── */
    .app-shell {
      width: 100%; max-width: 480px; margin: 0 auto;
      min-height: 100dvh; min-height: 100vh;
      background: var(--paper-edge); position: relative;
    }
    .scroll {
      height: 100dvh; height: 100vh;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 150px;
    }
    .scroll--nofooter { padding-bottom: 0; }

    /* ── HEADER ───────────────────────────────────────────────────── */
    .med-header {
      background: var(--navy-dark); color: var(--on-navy-fg);
      padding: max(env(safe-area-inset-top, 0px) + 16px, 24px) var(--s-10) var(--s-9);
      border-bottom: 1px solid var(--accent);
      position: sticky; top: 0; z-index: 20;
    }
    .med-header__top {
      display: flex; align-items: center; gap: var(--s-5);
      margin-bottom: var(--s-7);
    }
    .rx-badge {
      width: 24px; height: 24px;
      border: 1.5px solid var(--accent-bright);
      display: inline-grid; place-items: center;
      font-family: var(--font-serif); font-size: 13px;
      color: var(--accent-bright); flex-shrink: 0;
    }
    .rx-badge--confirm {
      width: 44px; height: 44px; border-radius: var(--r-full);
      border: 2px solid var(--state-ok); color: var(--state-ok); font-size: 22px;
    }
    .header-eyebrow {
      font: 600 9px/1.2 var(--font-sans);
      letter-spacing: .18em; text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .header-sync {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font: 400 11.5px/1 var(--font-mono); color: var(--on-navy-fg-dim);
    }
    .header-sync__dot {
      width: 6px; height: 6px; border-radius: var(--r-full); background: var(--state-ok);
    }
    .header-breadcrumb {
      margin-left: auto; font: 400 11.5px/1 var(--font-mono); color: var(--on-navy-fg-dim);
      background: none; border: none; cursor: pointer; padding: 4px 0;
    }
    .header-breadcrumb:active { opacity: .7; }
    .header-sub {
      font: 600 10px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim); margin-bottom: var(--s-2);
    }
    .header-title { font: 500 26px/1.1 var(--font-serif); color: var(--on-navy-fg); }
    .header-meta-strip {
      margin-top: var(--s-7); padding-top: var(--s-7);
      border-top: 1px solid var(--navy-light);
      display: flex; gap: var(--s-9);
    }
    .header-meta-item { display: flex; flex-direction: column; gap: 3px; }
    .header-meta-label {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .header-meta-val { font: 400 13px/1 var(--font-mono); color: var(--on-navy-fg); }

    /* ── SECTIONS ─────────────────────────────────────────────────── */
    .section { background: var(--paper); border-bottom: var(--rule-solid); }
    .section-head {
      display: flex; align-items: baseline; gap: var(--s-5);
      padding: var(--s-9) var(--s-9) var(--s-5);
      border-bottom: var(--rule-solid); background: var(--paper-edge);
    }
    .section-head__no {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--ink-dim); min-width: 20px;
    }
    .section-head__title { font: 600 15px/1.1 var(--font-serif); color: var(--ink); }
    .section-head__right {
      margin-left: auto; font: 600 9px/1.2 var(--font-sans);
      letter-spacing: .18em; text-transform: uppercase; color: var(--ink-dim);
    }

    /* ── ENTRY-CLASS BUTTON ───────────────────────────────────────── */
    .entry-class {
      width: 100%; display: grid; grid-template-columns: 44px 1fr auto;
      align-items: center; padding: var(--s-7) var(--s-9);
      background: var(--paper-2); border: none; border-bottom: var(--rule-solid);
      cursor: pointer; text-align: left; transition: background 120ms ease-out;
    }
    .entry-class:last-child { border-bottom: none; }
    .entry-class:hover  { background: var(--paper); }
    .entry-class:active { background: var(--paper-edge); }
    .entry-class:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
    .entry-class__code {
      width: 36px; height: 36px; display: inline-grid; place-items: center;
      background: var(--paper-2); border: 1px solid var(--paper-line);
      font: 600 15px/1 var(--font-sans); color: var(--ink);
    }
    .entry-class__body { display: flex; flex-direction: column; gap: 2px; padding: 0 var(--s-6); }
    .entry-class__name { font: 600 17px/1.2 var(--font-serif); color: var(--ink); }
    .entry-class__sub  { font: 400 11.5px/1.4 var(--font-sans); color: var(--ink-dim); }
    .entry-class__chev {
      font: 400 16px/1 var(--font-mono); color: var(--accent);
      transition: color 120ms ease-out;
    }
    .entry-class:hover .entry-class__chev { color: var(--accent-bright); }

    /* ── INTERVENTION ROW ─────────────────────────────────────────── */
    .intervention {
      display: grid; grid-template-columns: 48px 1fr auto;
      grid-template-rows: auto auto; column-gap: var(--s-6); row-gap: var(--s-2);
      padding: var(--s-7) var(--s-9); border-bottom: var(--rule-solid); background: var(--paper);
    }
    .intervention:last-child { border-bottom: none; }
    .intervention__code {
      grid-row: 1 / 3; display: flex; align-items: center; justify-content: center;
      font: 400 11px/1 var(--font-mono); color: var(--ink-dim); align-self: center;
    }
    .intervention__type  { font: 400 16px/1.35 var(--font-serif); color: var(--ink); }
    .intervention__value { font: 400 16px/1.35 var(--font-serif); color: var(--ink); text-align: right; }
    .intervention__admin { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); }
    .intervention__pill  { display: flex; justify-content: flex-end; }

    /* ── STATE PILL ───────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 7px; border-radius: var(--r-1);
      font: 400 10px/1 var(--font-mono); letter-spacing: .14em; background: #fff;
    }
    .pill::before { content: ''; width: 6px; height: 6px; border-radius: var(--r-full); }
    .pill--active   { color: var(--state-warn); border: 1px solid rgba(217,119,6,.33); }
    .pill--active::before   { background: var(--state-warn); }
    .pill--complete { color: var(--state-ok);   border: 1px solid rgba(34,197,94,.33); }
    .pill--complete::before { background: var(--state-ok); }
    .pill--pending  { color: var(--ink-dim);    border: 1px solid rgba(203,213,225,.5); }
    .pill--pending::before  { background: var(--state-pending); }

    /* ── OPTION ROW ───────────────────────────────────────────────── */
    .option-row {
      display: grid; grid-template-columns: 34px 1fr auto;
      column-gap: var(--s-7); align-items: center;
      padding: var(--s-7) var(--s-9); background: #fff; border-bottom: var(--rule-solid);
      border-left: 3px solid transparent; cursor: pointer;
      transition: background 160ms ease-out, border-left-color 160ms ease-out;
    }
    .option-row:last-child { border-bottom: none; }
    .option-row:hover { background: var(--paper-2); }
    .option-row[aria-selected="true"] { background: var(--accent-tint); border-left-color: var(--accent); }
    .option-row:focus-visible { border-left-color: var(--accent-bright); outline: none; }
    .radio-circle {
      width: 22px; height: 22px; border-radius: var(--r-full);
      border: 1.5px solid var(--paper-line); background: #fff;
      display: inline-grid; place-items: center; flex-shrink: 0;
      transition: all 160ms ease-out;
    }
    .option-row[aria-selected="true"] .radio-circle {
      border-color: var(--accent); background: var(--accent); color: #fff; font-size: 12px;
    }
    .option-row__body { display: flex; flex-direction: column; gap: 2px; }
    .option-row__name { font: 600 17px/1.2 var(--font-serif); color: var(--ink); }
    .option-row__sub  { font: 400 11.5px/1.4 var(--font-sans); color: var(--ink-dim); }
    .option-row__code { font: 400 11px/1 var(--font-mono); color: var(--ink-dim); }

    /* ── CHIPS ────────────────────────────────────────────────────── */
    .chips { display: flex; margin: var(--s-9); border: 1px solid var(--paper-line); }
    .chip {
      flex: 1 1 0; padding: var(--s-5) var(--s-5);
      text-align: center; font: 400 12px/1.3 var(--font-mono);
      background: #fff; color: var(--ink); border: none; cursor: pointer;
      transition: background 120ms ease-out;
    }
    .chips .chip + .chip { border-left: 1px solid var(--paper-line); }
    .chip:hover { background: var(--paper-2); }
    .chip[aria-pressed="true"] { background: var(--accent); color: #fff; }
    .chip:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: -2px; }

    /* ── FIELD GRID ───────────────────────────────────────────────── */
    .field-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      column-gap: var(--s-9); row-gap: var(--s-8); padding: var(--s-7) var(--s-9);
    }
    .field-grid--3 { grid-template-columns: 1fr 1fr 1fr; column-gap: var(--s-7); }
    .field-grid--1 { grid-template-columns: 1fr; }

    /* ── INPUT CELL ───────────────────────────────────────────────── */
    .cell { display: flex; flex-direction: column; min-width: 0; }
    .cell__label {
      font: 600 10px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--ink-dim);
    }
    .cell__value {
      margin-top: 4px; padding: 0 0 5px;
      border: none; border-bottom: var(--rule-dotted);
      background: transparent; font: 400 17px/1.2 var(--font-serif);
      color: var(--ink); outline: none; width: 100%;
    }
    .cell__value--mono { font: 400 13px/1.3 var(--font-mono); }
    .cell__value:focus { border-bottom: 1px solid var(--accent); }
    .cell__value[aria-invalid="true"] { border-bottom: 1px solid var(--state-err); color: var(--state-err); }
    .cell__value:disabled { color: var(--ink-dim); }
    .cell__hint { font: 400 10.5px/1.3 var(--font-mono); color: var(--ink-dim); margin-top: 3px; }

    /* ── SUPPLEMENT ROW ───────────────────────────────────────────── */
    .supplement-row {
      display: grid; grid-template-columns: 28px 1fr 28px;
      column-gap: var(--s-6); align-items: center;
      padding: var(--s-7) var(--s-9); background: #fff;
      border-bottom: var(--rule-solid); transition: background 120ms;
    }
    .supplement-row:last-child { border-bottom: none; }
    .supplement-row--checked { background: var(--paper-2); }
    .supplement-row--hold    { background: var(--paper-hold); }
    .supplement-check {
      width: 26px; height: 26px; display: inline-grid; place-items: center;
      border: 1.5px solid var(--paper-line); background: #fff; cursor: pointer;
      flex-shrink: 0; transition: all 120ms; font: 700 16px/1 var(--font-sans);
    }
    .supplement-check[aria-checked="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
    .supplement-check:focus-visible { outline: 2px solid var(--accent-bright); outline-offset: 2px; }
    .supplement-row__body { display: flex; flex-direction: column; gap: 2px; }
    .supplement-row__name { font: 400 16px/1.35 var(--font-serif); color: var(--ink); }
    .supplement-row__meta { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); }
    .supplement-row__idx  { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); text-align: right; }
    .hold-tag {
      font: 400 9px/1 var(--font-mono); letter-spacing: .14em; text-transform: uppercase;
      color: var(--state-warn); border: 1px solid rgba(217,119,6,.33);
      padding: 1px 5px; display: inline-block; margin-left: 6px;
    }

    /* ── ANNOTATION ───────────────────────────────────────────────── */
    .annotation-wrap { padding: var(--s-9); }
    .annotation {
      border-top: var(--rule-dashed); border-bottom: var(--rule-dashed);
      padding: var(--s-6) 0; width: 100%; background: transparent;
      resize: none; outline: none; font: italic 400 13.5px/1.5 var(--font-serif);
      color: var(--ink-dim); display: block; min-height: 72px;
    }
    .annotation:focus { color: var(--ink); }
    .annotation-meta {
      margin-top: 8px; display: flex; justify-content: space-between;
      font: 400 10.5px/1.3 var(--font-mono); color: var(--ink-dim);
    }

    /* ── PROGRESS BAR ─────────────────────────────────────────────── */
    .progress-wrap { padding: 0 var(--s-9) var(--s-7); }
    .progress {
      height: 6px; background: var(--paper-edge);
      border: 1px solid var(--paper-line); position: relative;
    }
    .progress__fill {
      position: absolute; inset: 0 auto 0 0;
      background: var(--state-warn); width: var(--progress, 0%);
      transition: width 240ms cubic-bezier(.2,0,0,1);
    }
    .progress__label {
      font: 400 10px/1 var(--font-mono); color: var(--ink-dim);
      margin-top: 5px; text-align: right;
    }

    /* ── SIGN-AND-FILE FOOTER ─────────────────────────────────────── */
    .sign-and-file {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: 0; width: 100%; max-width: 480px;
      background: var(--navy-dark); border-top: 1px solid var(--accent);
      padding: var(--s-7) var(--s-9) calc(var(--s-8) + env(safe-area-inset-bottom, 0px));
      display: flex; flex-direction: column; gap: var(--s-5); z-index: 30;
    }
    .saf-meta { display: flex; justify-content: space-between; align-items: flex-end; }
    .saf-sig { display: flex; flex-direction: column; gap: 3px; }
    .saf-sig__label {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .saf-sig__name {
      font: 400 13px/1.3 var(--font-serif); color: var(--on-navy-fg);
      border-bottom: 1px solid var(--ink-muted); padding-bottom: 3px; width: 140px;
    }
    .saf-time { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
    .saf-time__label {
      font: 600 9px/1.2 var(--font-sans); letter-spacing: .18em;
      text-transform: uppercase; color: var(--on-navy-fg-dim);
    }
    .saf-time__val { font: 400 13px/1 var(--font-mono); color: var(--on-navy-fg); }

    /* ── BUTTONS ──────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 15px var(--s-8);
      background: var(--accent-bright); color: #fff;
      border: none; border-radius: var(--r-1);
      font: 700 14px/1 var(--font-sans); letter-spacing: .22em; text-transform: uppercase;
      cursor: pointer; transition: background 120ms ease-out, transform 80ms ease-out;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary:hover  { background: #4a9fe1; }
    .btn-primary:active { background: var(--accent); transform: translateY(1px); }
    .btn-primary:focus-visible { outline: 2px solid #fff; outline-offset: -4px; }
    .btn-primary:disabled { background: var(--ink-muted); cursor: not-allowed; transform: none; }
    .btn-secondary {
      width: 100%; padding: 14px var(--s-6);
      background: transparent; color: var(--on-navy-fg);
      border: 1px solid var(--ink-muted); border-radius: var(--r-1);
      font: 600 11.5px/1 var(--font-sans); letter-spacing: .18em; text-transform: uppercase;
      cursor: pointer; transition: background 120ms;
    }
    .btn-secondary:hover  { background: rgba(255,255,255,.06); }
    .btn-secondary:active { opacity: .7; }

    /* ── ERROR BAND ───────────────────────────────────────────────── */
    .err-band {
      font: 400 11.5px/1.3 var(--font-mono); color: var(--state-err);
      background: var(--paper-hold); border-top: 1px solid var(--state-err);
      padding: var(--s-5) var(--s-9); display: none;
    }
    .err-band.show { display: block; }

    /* ── AUDIT FOOTER ─────────────────────────────────────────────── */
    .audit-footer {
      background: var(--paper-edge);
      padding: var(--s-8) var(--s-9) var(--s-14);
      font: 400 10.5px/1.8 var(--font-mono); color: var(--ink-dim);
    }
    .audit-footer .ok { color: var(--state-ok); }

    /* ── SPINNER ──────────────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 700ms linear infinite; }

    /* ── NUMBER ROW ───────────────────────────────────────────────── */
    .num-row {
      display: flex; align-items: center; gap: var(--s-6);
      padding: var(--s-7) var(--s-9);
    }
    .num-btn {
      width: 40px; height: 40px; border: 1px solid var(--paper-line);
      background: var(--paper-2); color: var(--ink); font-size: 22px;
      cursor: pointer; display: inline-grid; place-items: center;
      border-radius: var(--r-1); flex-shrink: 0; transition: background 120ms;
    }
    .num-btn:hover  { background: var(--paper-edge); }
    .num-btn:active { background: var(--paper-line); }
    .num-val { flex: 1; text-align: center; font: 500 30px/1 var(--font-serif); color: var(--ink); }
    .num-unit { font: 400 11px/1 var(--font-mono); color: var(--ink-dim); }

    /* ── FAST ACTIVE BANNER ───────────────────────────────────────── */
    .fast-banner {
      background: var(--navy-mid); border-bottom: 1px solid var(--accent);
      padding: var(--s-7) var(--s-9); display: flex; align-items: center; gap: var(--s-6);
    }
    .fast-banner__code { font: 400 11px/1 var(--font-mono); color: var(--on-navy-fg-dim); min-width: 32px; }
    .fast-banner__body { flex: 1; min-width: 0; }
    .fast-banner__type { font: 600 14px/1.2 var(--font-serif); color: var(--on-navy-fg); }
    .fast-banner__timer { font: 400 13px/1 var(--font-mono); color: var(--state-warn); margin-top: 2px; }
    .fast-banner__end {
      background: none; border: 1px solid rgba(220,38,38,.5); border-radius: var(--r-1);
      color: #fca5a5; font: 600 10px/1 var(--font-sans);
      letter-spacing: .14em; text-transform: uppercase;
      padding: 6px 10px; cursor: pointer; flex-shrink: 0; transition: background 120ms;
    }
    .fast-banner__end:hover { background: rgba(220,38,38,.15); }

    /* ── CONFIRM RECORD ROW ───────────────────────────────────────── */
    .confirm-row {
      display: grid; grid-template-columns: 100px 1fr;
      border-bottom: var(--rule-solid); padding: var(--s-6) var(--s-9);
    }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-row__key { font: 400 11px/1.3 var(--font-mono); color: var(--ink-dim); }
    .confirm-row__val { font: 400 16px/1.35 var(--font-serif); color: var(--ink); word-break: break-word; }

    /* ── TAB STRIP ────────────────────────────────────────────────── */
    .tab-strip {
      display: flex; overflow-x: auto; padding: var(--s-5) var(--s-7) 0;
      background: var(--paper-edge); border-bottom: var(--rule-solid);
      scrollbar-width: none;
    }
    .tab-strip::-webkit-scrollbar { display: none; }
    .tab-chip {
      padding: var(--s-5) var(--s-7); font: 400 11.5px/1 var(--font-mono);
      background: transparent; color: var(--ink-dim);
      border: none; border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: color 120ms, border-color 120ms;
    }
    .tab-chip[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--accent); }

    /* ── MISC ─────────────────────────────────────────────────────── */
    .empty-state {
      padding: var(--s-14) var(--s-9); text-align: center;
      font: 400 13px/1.6 var(--font-mono); color: var(--ink-dim);
    }
    .section-pad { padding: var(--s-7) var(--s-9); }
    .divider { height: var(--s-4); background: var(--paper-edge); border-bottom: var(--rule-solid); }

    /* ── REDUCED MOTION ───────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0ms !important; animation-duration: 0ms !important;
      }
    }

    /* ── DOSE QTY INPUT ─────────────────────────────────────────────── */
    .dose-qty-input {
      display: inline; width: 46px;
      border: none; border-bottom: 1px dotted var(--paper-line);
      background: transparent; font: 400 11px/1.3 var(--font-mono);
      color: var(--ink); outline: none; text-align: right; padding: 0 2px;
    }
    .dose-qty-input:focus { border-bottom-color: var(--accent); }

    /* ── REVIEW ENTRY ───────────────────────────────────────────────── */
    .review-entry {
      border-bottom: var(--rule-solid); background: var(--paper);
      cursor: pointer; transition: background 120ms;
    }
    .review-entry:last-child { border-bottom: none; }
    .review-entry:hover { background: var(--paper-2); }
    .review-entry__head {
      display: grid; grid-template-columns: 44px 1fr auto;
      align-items: center; padding: var(--s-7) var(--s-9);
    }
    .review-entry__code { font: 400 11px/1 var(--font-mono); color: var(--ink-dim); }
    .review-entry__label { font: 400 16px/1.35 var(--font-serif); color: var(--ink); }
    .review-entry__time { font: 400 11px/1 var(--font-mono); color: var(--ink-dim); }
    .review-entry__detail {
      display: none; padding: 0 var(--s-9) var(--s-7);
      font: 400 11px/1.6 var(--font-mono); color: var(--ink-dim);
      border-top: var(--rule-dashed);
    }
    .review-entry__detail.open { display: block; }
    .review-entry__detail-row { display: grid; grid-template-columns: 100px 1fr; padding: 3px 0; }
    .review-entry__detail-key { color: var(--ink-muted); }
    .review-entry__detail-val { color: var(--ink); word-break: break-word; }

  </style>
</head>
<body>
<div class="app-shell">
  <div class="scroll" id="scroll">
    <div id="app"></div>
  </div>
  <div class="sign-and-file" id="saf" style="display:none"></div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const PB_URL = 'https://journal-api.fybertech.cloud';

// ── POCKETBASE CLIENT (minimal REST wrapper, no SDK) ────────────────────────
// Self-hosted replacement for the old supabase-js client. The collection's
// API rules are public (no auth), matching the old anon-key trust model, so
// no Authorization header is needed.
const PB = {
  async list(params) {
    const qs = new URLSearchParams(params).toString();
    try {
      const res  = await fetch(`${PB_URL}/api/collections/journal_entries/records?${qs}`);
      const json = await res.json();
      if (!res.ok) return { data: null, error: json };
      return { data: json.items, error: null };
    } catch (e) { return { data: null, error: { message: String(e) } }; }
  },
  async insert(record) {
    try {
      const res = await fetch(`${PB_URL}/api/collections/journal_entries/records`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(record)
      });
      const json = await res.json();
      if (!res.ok) return { data: null, error: json };
      return { data: json, error: null };
    } catch (e) { return { data: null, error: { message: String(e) } }; }
  },
  async update(id, record) {
    try {
      const res = await fetch(`${PB_URL}/api/collections/journal_entries/records/${id}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(record)
      });
      const json = await res.json();
      if (!res.ok) return { data: null, error: json };
      return { data: json, error: null };
    } catch (e) { return { data: null, error: { message: String(e) } }; }
  },
  async remove(id) {
    try {
      const res = await fetch(`${PB_URL}/api/collections/journal_entries/records/${id}`, { method: 'DELETE' });
      if (!res.ok) { const json = await res.json().catch(() => ({})); return { error: json }; }
      return { error: null };
    } catch (e) { return { error: { message: String(e) } }; }
  },
};

// PocketBase date-filter values need a space, not 'T', separating date/time.
function pbDate(iso) { return iso.replace('T', ' '); }

// ── SUPPLEMENTS ────────────────────────────────────────────────────────────
const SUPS = [
  { name:'Tirzepatide',           dose:'2.0mg',     class:'GLP-1/GIP',  route:'inj', hold:false },
  { name:'Repatha',               dose:'23.5mg',    class:'PCSK9 mAb',  route:'inj', hold:false },
  { name:'Vitamin D3',            dose:'10,000 IU', class:'vitamin',    route:'po',  hold:false },
  { name:'Nicotinamide Riboside', dose:'1g',        class:'NAD+ prec.', route:'po',  hold:false },
  { name:'Magnesium Glycinate',   dose:'360mg',     class:'mineral',    route:'po',  hold:false },
  { name:'Omega-3',               dose:'4g',        class:'EPA/DHA',    route:'po',  hold:false },
  { name:'Creatine Monohydrate',  dose:'20g',       class:'ergogenic',  route:'po',  hold:false },
  { name:'Glycine',               dose:'3g',        class:'amino',      route:'po',  hold:false },
  { name:'GHK-Cu',                dose:'2.0mg',     class:'peptide',    route:'sc',  hold:false },
];

// ── ENTRY META ─────────────────────────────────────────────────────────────
const EMETA = {
  heart_rate: { code:'HE', label:'Heart Rate',       sub:'cardio · BLE monitor'  },
  fast:       { code:'FA', label:'Fast',             sub:'fasting window log'    },
  supplement: { code:'SU', label:'Supplements',      sub:'daily stack admin.'    },
  red_light:  { code:'RL', label:'Red Light',        sub:'photobiomodulation'    },
  sauna:      { code:'SA', label:'Sauna',            sub:'thermal recovery'      },
  alcohol:    { code:'AL', label:'Alcohol',          sub:'consumption event'     },
  massage:    { code:'MA', label:'Massage',          sub:'soft tissue recovery'  },
  flight:     { code:'FL', label:'Overnight Flight', sub:'sleep disruption log'  },
  timezone:   { code:'TZ', label:'Timezone Change',  sub:'circadian context'     },
  note:       { code:'NT', label:'Note',             sub:'free-text observation' },
};

// ── HEART RATE ZONES (Nov 2025 VO2 Max test: VT1 129 / VT2 158 / HRmax 175) ─
// Do not change without ingesting new VO2 Max test results (next: Sep 2026).
const HR_ZONES = [
  { key: 'sub1', label: 'Sub-1 · Rest',      min: 0,   max: 99,  color: '#94a3b8' },
  { key: 'z1',   label: 'Z1 · Recovery',     min: 100, max: 116, color: '#22c55e' },
  { key: 'z2',   label: 'Z2 · Fat Burn',     min: 117, max: 129, color: '#84cc16' },
  { key: 'z3',   label: 'Z3 · Aerobic',      min: 130, max: 150, color: '#f59e0b' },
  { key: 'z4',   label: 'Z4 · Threshold',    min: 151, max: 158, color: '#f97316' },
  { key: 'z5',   label: 'Z5 · VO2 Max',      min: 159, max: 999, color: '#dc2626' },
];



// ── STATE ──────────────────────────────────────────────────────────────────
let db           = null;
let fastTick     = null;
let safClockTick = null;
let currentSubmit = null;
let currentType   = null;
let confirmEntry  = null;

// ── HEART RATE STATE ────────────────────────────────────────────────────────
let hrDevice      = null;   // BLE BluetoothDevice reference
let hrChar        = null;   // BLE characteristic reference
let hrBuffer      = [];     // Rolling 5-reading buffer for smoothed display
let hrSamples     = [];     // {t: activeSec, bpm} — downsampled to 1/5s for chart
let hrRRBuffer    = [];     // Raw RR intervals (ms) for RMSSD calculation
let hrStartTime   = null;   // Date.now() when Start Exercise was pressed
let hrEndTime     = null;   // Date.now() when End Exercise was pressed (wall clock)
let hrPausedAt    = null;   // Date.now() when BLE dropped mid-session (null = not paused)
let hrPausedTotal = 0;      // Accumulated paused ms — excluded from duration & zones
let hrSessionData = null;   // Computed results object, populated by hrEndExercise()
let hrTimerTick   = null;   // setInterval reference for session timer display

// ── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (PB_URL && !PB_URL.includes('YOUR_')) {
    db = true;
  }
  window.addEventListener('hashchange', render);
  if (!location.hash || location.hash === '#') location.hash = '#home';
  else render();
});

// ── ROUTER ─────────────────────────────────────────────────────────────────
function navigate(hash) { location.hash = hash; }

function render() {
  // Disconnect BLE heart rate monitor if navigating away from HR form.
  // NOTE: do NOT clear hrSamples/hrBuffer/hrRRBuffer/hrSessionData here —
  // submitHeartRate() clears them after a successful write.
  if (hrChar)   { hrChar.stopNotifications().catch(function(){}); hrChar = null; }
  if (hrDevice) { try { hrDevice.gatt.disconnect(); } catch(e){} hrDevice = null; }
  clearInterval(hrTimerTick);
  const hash = location.hash || '#home';
  const scroll = document.getElementById('scroll');
  hideSaf();

  if (hash === '#home' || hash === '#') {
    scroll.classList.add('scroll--nofooter');
    renderHome();
  } else if (hash === '#confirm') {
    scroll.classList.add('scroll--nofooter');
    renderConfirm();
  } else if (hash.startsWith('#log/')) {
    scroll.classList.remove('scroll--nofooter');
    renderForm(hash.replace('#log/', ''));
  } else if (hash === '#review') {
    scroll.classList.remove('scroll--nofooter');
    renderLogReview();
  } else {
    scroll.classList.add('scroll--nofooter');
    renderHome();
  }
  document.getElementById('scroll').scrollTop = 0;
}

// ── HOME SCREEN ────────────────────────────────────────────────────────────
function renderHome() {
  clearInterval(fastTick);
  const app = document.getElementById('app');
  const now = new Date();
  const activeFast = getActiveFast();

  app.innerHTML = `
    <div class="med-header">
      <div class="med-header__top">
        <span class="rx-badge">&#8478;</span>
        <span class="header-eyebrow">HEALTH.DB &middot; JOURNAL</span>
        <span class="header-sync"><span class="header-sync__dot"></span>LIVE</span>
      </div>
      <div class="header-sub">${fmtHeaderDate(now)}</div>
      <div class="header-title">Today's Record</div>
    </div>

    ${activeFast ? `
    <div class="fast-banner" id="fast-banner">
      <span class="fast-banner__code">FA</span>
      <div class="fast-banner__body">
        <div class="fast-banner__type">${activeFast.type} &middot; ACTIVE FAST</div>
        <div class="fast-banner__timer" id="banner-timer">&#8212;</div>
      </div>
      <button class="fast-banner__end" onclick="endFast()">END FAST</button>
    </div>` : ''}

    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;01</span>
        <span class="section-head__title">Log Entry</span>
        <span class="section-head__right">tap to open</span>
      </div>
      ${Object.entries(EMETA).map(([type, m]) => `
        <button class="entry-class" onclick="navigate('#log/${type}')">
          <span class="entry-class__code">${m.code}</span>
          <span class="entry-class__body">
            <span class="entry-class__name">${m.label}</span>
            <span class="entry-class__sub">${m.sub}</span>
          </span>
          <span class="entry-class__chev">&rarr;</span>
        </button>`).join('')}
    </div>

    <div class="section">
      <div class="section-head">
        <span class="section-head__no">&sect;02</span>
        <span class="section-head__title">Log Review</span>
        <span class="section-head__right">recent entries</span>
      </div>
      <button class="entry-class" onclick="navigate('#review')">
        <span class="entry-class__code">LR</span>
        <span class="entry-class__body">
          <span class="entry-class__name">Review Logs</span>
          <span class="entry-class__sub">last 10 entries &middot; tap to expand</span>
        </span>
        <span class="entry-class__chev">&rarr;</span>
      </button>
    </div>

    <div class="audit-footer">
      &middot; subject 01 &middot; health.db<br>
      &middot; journal v3 &middot; medical record ui<br>
      <span class="ok">+</span> data writes to pocketbase in real-time
    </div>`;

  if (activeFast) startFastBannerTimer(activeFast);
}

function startFastBannerTimer(fast) {
  clearInterval(fastTick);
  function update() {
    const el = document.getElementById('banner-timer');
    if (!el) { clearInterval(fastTick); return; }
    const ms  = Date.now() - new Date(fast.startedAt).getTime();
    const pct = Math.min(Math.round((ms / (fast.window_hours * 3600000)) * 100), 100);
    el.textContent = fmtDur(ms) + ' · ' + pct + '%';
  }
  update();
  fastTick = setInterval(update, 1000);
}

async function loadTodayEntries() {
  const el      = document.getElementById('today-entries');
  const countEl = document.getElementById('today-count');
  if (!el) return;
  if (!db) { el.innerHTML = '<div class="empty-state">configure backend</div>'; return; }
  const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
  const { data, error } = await PB.list({
    filter: `started_at >= "${pbDate(todayStart.toISOString())}"`,
    sort: '-started_at',
  });
  if (error || !data || !data.length) {
    el.innerHTML = '<div class="empty-state">no entries logged today</div>';
    if (countEl) countEl.textContent = '0 entries';
    return;
  }
  if (countEl) countEl.textContent = data.length + (data.length === 1 ? ' entry' : ' entries');
  el.innerHTML = data.map(e => {
    const m      = EMETA[e.entry_type] || { code: e.entry_type.substring(0,2).toUpperCase(), label: e.entry_type };
    const meta   = e.metadata || {};
    const detail = entryDetail(e.entry_type, meta, e.notes);
    const status = (e.entry_type === 'fast' && !e.ended_at) ? 'active' : 'complete';
    return `<div class="intervention">
      <span class="intervention__code">${m.code}</span>
      <span class="intervention__type">${m.label}</span>
      <span class="intervention__value">${ago(new Date(e.started_at))}</span>
      <span></span>
      <span class="intervention__admin">${detail}</span>
      <span class="intervention__pill">
        <span class="pill pill--${status}">${status === 'active' ? 'IN PROGRESS' : 'COMPLETE'}</span>
      </span>
    </div>`;
  }).join('');
}

function entryDetail(type, meta, notes) {
  switch (type) {
    case 'heart_rate':
      return (meta.exercise_type || 'Cardio') + ' · ' +
        Math.floor((meta.duration_sec || 0) / 60) + ' min · avg ' +
        (meta.bpm_avg || '--') + ' bpm';
    case 'fast':       return (meta.fast_type || meta.protocol_label || '') + (notes ? ' · ' + notes.substring(0,30) : '');
    case 'supplement': return (meta.taken || []).length + ' supplements logged';
    case 'red_light':  return (meta.duration_min || '') + ' min' + (meta.zone || meta.area ? ' · ' + (meta.zone || meta.area) : '');
    case 'sauna':      return (meta.duration_min || '') + ' min · ' + (meta.type || meta.heat_type || '');
    case 'alcohol':    return (meta.drinks || '') + ' drink' + ((meta.drinks > 1) ? 's' : '') + (meta.type ? ' · ' + meta.type : '');
    case 'massage':    return (meta.duration_min || '') + ' min · ' + (meta.type || '');
    case 'flight':     return (meta.from || '') + ' → ' + (meta.to || '');
    case 'timezone':   return (meta.from_tz || '') + ' → ' + (meta.to_tz || '');
    case 'note':       return (meta.text || notes || '').substring(0, 50);
    default:           return notes || '';
  }
}

// ── FORM DISPATCHER ────────────────────────────────────────────────────────
function renderForm(type) {
  currentType = type;
  const meta = EMETA[type];
  if (!meta) { navigate('#home'); return; }
  switch (type) {
    case 'heart_rate': buildHeartRateForm(meta);  break;
    case 'fast':       buildFastForm(meta);       break;
    case 'supplement': buildSupplementForm(meta); break;
    case 'sauna':      buildSaunaForm(meta);      break;
    case 'red_light':  buildRedLightForm(meta);   break;
    case 'alcohol':    buildAlcoholForm(meta);    break;
    case 'massage':    buildMassageForm(meta);    break;
    case 'flight':     buildFlightForm(meta);     break;
    case 'timezone':   buildTimezoneForm(meta);   break;
    case 'note':       buildNoteForm(meta);       break;
    default: navigate('#home');
  }
  if (type === 'heart_rate') { hideSaf(); return; }   // LOG IT shown only after session ends
  showSaf(type === 'fast' ? (getActiveFast() ? 'END FAST' : 'START FAST') : 'LOG IT');
}

// ── FAST FORM ──────────────────────────────────────────────────────────────
function buildFastForm(meta) {
  clearInterval(fastTick);
  var app = document.getElementById('app');
  var nowV = toLocalDatetimeInput(new Date());
  var activeFast = getActiveFast();
  if (activeFast) {
    var startedLocal = toLocalDatetimeInput(new Date(activeFast.startedAt));
    var elapsed = fmtDur(Date.now() - new Date(activeFast.startedAt).getTime());
    app.innerHTML =
      formHeader(meta, '01', 'End fast') +
      '<div class="section">' +
        '<div class="section-head"><span class="section-head__no">&sect;01</span>' +
        '<span class="section-head__title">Active fast</span></div>' +
        '<div class="field-grid">' +
          '<label class="cell"><span class="cell__label">STARTED AT</span>' +
          '<input class="cell__value cell__value--mono" disabled value="' + startedLocal + '"></label>' +
          '<label class="cell"><span class="cell__label">ELAPSED</span>' +
          '<input class="cell__value cell__value--mono" id="f-fast-elapsed" disabled value="' + elapsed + '"></label>' +
        '</div>' +
      '</div>' +
      '<div class="section">' +
        '<div class="section-head"><span class="section-head__no">&sect;02</span>' +
        '<span class="section-head__title">Set end time</span></div>' +
        '<div class="field-grid field-grid--1">' +
          '<label class="cell"><span class="cell__label">ENDED AT</span>' +
          '<input class="cell__value cell__value--mono" id="f-fast-end" type="datetime-local" value="' + nowV + '">' +
          '<span class="cell__hint">default: now</span></label>' +
        '</div>' +
      '</div>' +
      '<div class="section">' +
        '<div class="section-head"><span class="section-head__no">&sect;03</span>' +
        '<span class="section-head__title">Annotation</span>' +
        '<span class="section-head__right">optional</span></div>' +
        '<div class="annotation-wrap">' +
          '<textarea class="annotation" id="f-fast-note" maxlength="500" placeholder="Notes&hellip;"></textarea>' +
          '<div class="annotation-meta"><span id="f-fast-nc">0 / 500 char</span></div>' +
        '</div>' +
      '</div>';
    fastTick = setInterval(function() {
      var el = document.getElementById('f-fast-elapsed');
      if (!el) { clearInterval(fastTick); return; }
      el.value = fmtDur(Date.now() - new Date(activeFast.startedAt).getTime());
    }, 1000);
  } else {
    app.innerHTML =
      formHeader(meta, '01', 'Start fast') +
      '<div class="section">' +
        '<div class="section-head"><span class="section-head__no">&sect;01</span>' +
        '<span class="section-head__title">Start time</span></div>' +
        '<div class="field-grid field-grid--1">' +
          '<label class="cell"><span class="cell__label">STARTED AT</span>' +
          '<input class="cell__value cell__value--mono" id="f-fast-start" type="datetime-local" value="' + nowV + '">' +
          '<span class="cell__hint">default: now</span></label>' +
        '</div>' +
      '</div>' +
      '<div class="section">' +
        '<div class="section-head"><span class="section-head__no">&sect;02</span>' +
        '<span class="section-head__title">Annotation</span>' +
        '<span class="section-head__right">optional</span></div>' +
        '<div class="annotation-wrap">' +
          '<textarea class="annotation" id="f-fast-note" maxlength="500" placeholder="Notes&hellip;"></textarea>' +
          '<div class="annotation-meta"><span id="f-fast-nc">0 / 500 char</span></div>' +
        '</div>' +
      '</div>';
  }
  document.getElementById('f-fast-note').addEventListener('input', function() {
    document.getElementById('f-fast-nc').textContent = this.value.length + ' / 500 char';
  });
  currentSubmit = submitFast;
}

async function submitFast() {
  var noteEl = document.getElementById('f-fast-note');
  var note = noteEl ? noteEl.value.trim() || null : null;
  var activeFast = getActiveFast();
  if (activeFast) {
    var endEl = document.getElementById('f-fast-end');
    var endedAt = (endEl && endEl.value) ? new Date(endEl.value).toISOString() : new Date().toISOString();
    setBtnLoading(true); clearErr();
    if (!db) { showErr('Backend not configured'); setBtnLoading(false); return; }
    var result = await PB.update(activeFast.id, { ended_at: endedAt, notes: note });
    setBtnLoading(false);
    if (result.error) { showErr(result.error.message || 'could not update entry'); autoHideErr(6000); return; }
    clearActiveFast(); clearInterval(fastTick);
    confirmEntry = result.data; navigate('#confirm');
  } else {
    var startEl = document.getElementById('f-fast-start');
    if (!startEl || !startEl.value) { showErr('Start time required'); return; }
    var startedAt = new Date(startEl.value).toISOString();
    setBtnLoading(true); clearErr();
    if (!db) { showErr('Backend not configured'); setBtnLoading(false); return; }
    var result = await PB.insert({
      entry_type: 'fast', started_at: startedAt, ended_at: null, notes: note,
      metadata: { fast_type: 'manual' },
    });
    setBtnLoading(false);
    if (result.error) { showErr(result.error.message || 'could not write entry'); autoHideErr(6000); return; }
    saveActiveFast({ type: 'manual', startedAt: startedAt, id: result.data.id, window_hours: 18 });
    confirmEntry = result.data; navigate('#confirm');
  }
}

// ── SUPPLEMENT FORM ────────────────────────────────────────────────────────
function parseDose(doseStr) {
  var m = String(doseStr).match(/^([\d.,]+)\s*(.*)$/);
  if (m) return { qty: m[1], unit: m[2].trim() };
  return { qty: doseStr, unit: '' };
}

function getCustomSups() {
  try { return JSON.parse(localStorage.getItem('custom_sups') || '[]'); } catch(e) { return []; }
}

function saveCustomSup(sup) {
  var arr = getCustomSups();
  arr.push(sup);
  localStorage.setItem('custom_sups', JSON.stringify(arr));
}

function buildSupplementForm(meta) {
  var app    = document.getElementById('app');
  var doses  = getStoredDoses();
  var allSups = SUPS.concat(getCustomSups());

  var rowsHtml = allSups.map(function(s, i) {
    var d  = doses[s.name] || s.dose;

function saveAndAddSup() {
  var name  = (document.getElementById('new-sup-name')  || {}).value || '';
  var qty   = (document.getElementById('new-sup-qty')   || {}).value || '';
  var unit  = (document.getElementById('new-sup-unit')  || {}).value || '';
  var cls   = (document.getElementById('new-sup-class') || {}).value || '';
  var route = (document.getElementById('new-sup-route') || {}).value || 'po';
  if (!name.trim()) { alert('Name is required'); return; }
  saveCustomSup({ name: name.trim(), dose: qty.trim() + unit.trim(), class: cls.trim() || 'custom', route: route, hold: false });
  buildSupplementForm(EMETA.supplement);

function toggleSup(i) {
  var chk     = document.getElementById('sup-chk-' + i);
  var row     = document.getElementById('sup-row-' + i);
  var checked = chk.getAttribute('aria-checked') === 'true';
  chk.setAttribute('aria-checked', String(!checked));
  chk.textContent = !checked ? '\u2713' : '';
  row.classList.toggle('supplement-row--checked', !checked);
  var count = document.querySelectorAll('.supplement-check[aria-checked="true"]').length;
  var el    = document.getElementById('sup-count');
  if (el) el.textContent = count;
}

function selectTab(el, groupId) {
  document.querySelectorAll('#' + groupId + ' .tab-chip').forEach(function(t) { t.setAttribute('aria-selected', 'false'); });
  el.setAttribute('aria-selected', 'true');
  var wrap = document.getElementById('custom-time-wrap');
  if (wrap) wrap.style.display = el.dataset.time === 'Custom' ? '' : 'none';
}

async function submitSupplement() {
  var allSups = SUPS.concat(getCustomSups());
  var taken = [], skipped = [];
  allSups.forEach(function(s, i) {
    var chk = document.getElementById('sup-chk-' + i);
    if (chk && chk.getAttribute('aria-checked') === 'true') {
      var doseQtyEl = document.getElementById('dose-qty-' + i);
      var pd = parseDose(s.dose);
      var qty = doseQtyEl ? doseQtyEl.value.trim() : pd.qty;
      var finalDose = qty + (pd.unit ? pd.unit : '');
      taken.push({ supplement_id: i + 1, name: s.name, dose: finalDose });
    } else {
      skipped.push({ supplement_id: i + 1, name: s.name, reason: s.hold ? 'hold' : 'not taken' });
    }
  });
  if (!taken.length) { showErr('Select at least one supplement'); return; }
  var activeTabEl = document.querySelector('#time-tabs [aria-selected="true"]');
  var activeTab   = activeTabEl ? activeTabEl.dataset.time : 'Now';
  var takenAt = new Date().toISOString();
  if (activeTab !== 'Now' && activeTab !== 'Custom') {
    var parts = activeTab.split(':').map(Number);
    var d = new Date(); d.setHours(parts[0], parts[1], 0, 0); takenAt = d.toISOString();
  } else if (activeTab === 'Custom') {
    var cv = document.getElementById('f-sup-custom');
    if (cv && cv.value) takenAt = new Date(cv.value).toISOString();
  }
  var noteEl = document.getElementById('f-sup-note');
  var note   = noteEl ? noteEl.value.trim() || null : null;
  saveDoses(taken.map(function(t) { return { name: t.name, dose: t.dose }; }));
  var metadata = {
    taken:      taken.map(function(t) { return { name: t.name, dose: t.dose }; }),
    taken_full: taken, skipped: skipped,
    preset_time: activeTab.toLowerCase(), count: taken.length, of: allSups.length,
  };
  await writeEntry('supplement', takenAt, takenAt, note, metadata);
}

function calcTzOffset() {
  var fromEl = document.getElementById('f-tz-from');

  var offEl  = document.getElementById('f-tz-offset');
  if (!fromEl || !toEl || !offEl) return;
  var fromKey = fromEl.value.trim().toUpperCase();
  var toKey   = toEl.value.trim().toUpperCase();
  if (TZ_OFFSETS[fromKey] !== undefined && TZ_OFFSETS[toKey] !== undefined) {

    offEl.value = (diff >= 0 ? '+' : '') + diff;
    offEl.style.color = 'var(--accent-bright)';
  }
}

// Active session time (ms), excluding BLE-dropout pauses
function hrActiveElapsedMs() {
  if (!hrStartTime) return 0;
  var pausedNow = hrPausedAt ? (Date.now() - hrPausedAt) : 0;
  return Math.max(0, Date.now() - hrStartTime - hrPausedTotal - pausedNow);
}

async function hrConnect() {
  if (!navigator.bluetooth) {
    showErr('Web Bluetooth not supported in this browser. Use Chrome on Android.');
    return;
  }
  var btn = document.getElementById('hr-connect-btn');
  var statusEl = document.getElementById('hr-ble-status');
  if (statusEl) { statusEl.textContent = '◌ CONNECTING…'; statusEl.style.color = 'var(--state-warn)'; }
  if (btn) { btn.textContent = 'CONNECTING…'; btn.disabled = true; }

  try {
    var device = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['heart_rate'] }]
    });
    hrDevice = device;
    device.addEventListener('gattserverdisconnected', hrOnDisconnect);

    var server = await device.gatt.connect();
    var service = await server.getPrimaryService('heart_rate');
    hrChar = await service.getCharacteristic('heart_rate_measurement');
    hrChar.addEventListener('characteristicvaluechanged', hrOnData);
    await hrChar.startNotifications();

    updateHRConnectState('connected');
  } catch(e) {
    updateHRConnectState('idle');
    if (e.name !== 'NotFoundError') {   // NotFoundError = user cancelled picker, not an error
      showErr('BLE: ' + (e.message || 'connection failed'));
      autoHideErr(5000);
    }
  }
}

function hrOnData(event) {
  var value  = event.target.value;
  var flags  = value.getUint8(0);
  var is16   = flags & 0x01;
  var hasRR  = flags & 0x10;
  var bpm, offset;

  if (is16) {
    bpm    = value.getUint16(1, true);
    offset = 3;
  } else {
    bpm    = value.getUint8(1);
    offset = 2;
  }

  // FIX 1 (resume): data flowing again after a mid-session dropout ends the pause
  if (hrStartTime && hrPausedAt) {
    hrPausedTotal += Date.now() - hrPausedAt;
    hrPausedAt = null;
    var timerEl = document.getElementById('hr-timer');
    if (timerEl) timerEl.style.color = 'var(--on-navy-fg)';
    clearErr();
  }

  // 5-reading rolling average for smooth display
  hrBuffer.push(bpm);
  if (hrBuffer.length > 5) hrBuffer.shift();
  var avgBpm = Math.round(hrBuffer.reduce(function(a, b) { return a + b; }, 0) / hrBuffer.length);

  var displayEl = document.getElementById('hr-live-bpm');
  if (displayEl) displayEl.textContent = String(avgBpm).padStart(3, ' ');  // U+2007 figure space for mono alignment

  // Record sample if session is active (one point per 5 active seconds)
  if (hrStartTime) {
    var elapsed = Math.floor(hrActiveElapsedMs() / 1000);
    var last = hrSamples[hrSamples.length - 1];
    if (!last || elapsed - last.t >= 5) {
      hrSamples.push({ t: elapsed, bpm: avgBpm });
    }
  }

  // FIX 2: collect RR intervals only during an active, unpaused session
  if (hasRR && hrStartTime && !hrPausedAt) {
    var rrOffset = offset;
    while (rrOffset + 1 < value.byteLength) {
      var rrRaw = value.getUint16(rrOffset, true);
      hrRRBuffer.push(Math.round((rrRaw / 1024) * 1000));   // convert to ms
      rrOffset += 2;
    }
  }
}

function hrOnDisconnect() {
  hrChar = null;
  updateHRConnectState('idle');
  var displayEl = document.getElementById('hr-live-bpm');
  if (displayEl) { displayEl.textContent = '---'; displayEl.style.color = 'var(--state-err)'; }
  var statusEl = document.getElementById('hr-ble-status');
  if (statusEl) { statusEl.textContent = '✗ DISCONNECTED'; statusEl.style.color = 'var(--state-err)'; }
  if (hrStartTime) {
    // FIX 1: actually pause — freeze active-time accumulation until data resumes
    if (!hrPausedAt) hrPausedAt = Date.now();
    var timerEl = document.getElementById('hr-timer');
    if (timerEl) timerEl.style.color = 'var(--state-warn)';
    showErr('Monitor disconnected — session paused. Reconnect to continue.');
    autoHideErr(8000);
  }
}

function updateHRConnectState(state) {
  var statusEl    = document.getElementById('hr-ble-status');
  var connectBtn  = document.getElementById('hr-connect-btn');
  var startBtn    = document.getElementById('hr-start-btn');
  var displayEl   = document.getElementById('hr-live-bpm');

  if (state === 'idle') {
    if (statusEl)   { statusEl.textContent = '● NOT CONNECTED'; statusEl.style.color = 'var(--state-err)'; }
    if (connectBtn) { connectBtn.textContent = 'CONNECT MONITOR'; connectBtn.disabled = false; }
    if (startBtn)   { startBtn.disabled = true; startBtn.style.opacity = '.4'; }
    if (displayEl)  { displayEl.textContent = '---'; displayEl.style.color = 'var(--state-err)'; }
  } else if (state === 'connected') {
    if (statusEl)   { statusEl.textContent = '● CONNECTED'; statusEl.style.color = 'var(--state-ok)'; }
    if (connectBtn) { connectBtn.textContent = 'RECONNECT'; connectBtn.disabled = false; }
    if (startBtn)   { startBtn.disabled = false; startBtn.style.opacity = '1'; }
    if (displayEl)  { displayEl.style.color = 'var(--state-ok)'; }
  }
}

function hrStartExercise() {
  if (!hrDevice || !hrDevice.gatt.connected) {
    showErr('Connect the monitor first'); autoHideErr(4000); return;
  }
  hrStartTime   = Date.now();
  hrEndTime     = null;
  hrPausedAt    = null;
  hrPausedTotal = 0;
  hrSamples     = [];
  hrRRBuffer    = [];

  var startBtn = document.getElementById('hr-start-btn');
  var endBtn   = document.getElementById('hr-end-btn');
  if (startBtn) startBtn.style.display = 'none';
  if (endBtn)   endBtn.style.display   = '';

  clearInterval(hrTimerTick);
  hrTimerTick = setInterval(function() {
    var el = document.getElementById('hr-timer');
    if (!el) { clearInterval(hrTimerTick); return; }
    el.textContent = fmtDur(hrActiveElapsedMs());   // freezes while paused
  }, 1000);
}

function hrEndExercise() {
  if (!hrStartTime) { showErr('No active session'); return; }
  hrEndTime = Date.now();
  // Fold any open pause into the total before computing duration
  if (hrPausedAt) { hrPausedTotal += hrEndTime - hrPausedAt; hrPausedAt = null; }
  var durationSec = Math.floor((hrEndTime - hrStartTime - hrPausedTotal) / 1000);
  var pausedSec   = Math.round(hrPausedTotal / 1000);
  clearInterval(hrTimerTick);

  // Stop BLE notifications (device stays connected for reconnect)
  if (hrChar) hrChar.stopNotifications().catch(function(){});

  // Compute statistics
  var allBpm = hrSamples.map(function(s) { return s.bpm; });
  var bpmAvg = allBpm.length ? Math.round(allBpm.reduce(function(a,b){return a+b;},0) / allBpm.length) : 0;
  var bpmMax = allBpm.length ? Math.max.apply(null, allBpm) : 0;
  var bpmMin = allBpm.length ? Math.min.apply(null, allBpm) : 0;
  var rmssd  = hrCalcRMSSD(hrRRBuffer);
  var zoneTimes = hrCalcZoneTimes(hrSamples, durationSec);

  var exerciseTypeEl = document.querySelector('#hr-exercise-chips [aria-pressed="true"]');
  var exerciseType   = exerciseTypeEl ? exerciseTypeEl.textContent.trim() : 'Cardio';

  hrSessionData = {
    exercise_type:  exerciseType,
    duration_sec:   durationSec,
    bpm_avg:        bpmAvg,
    bpm_max:        bpmMax,
    bpm_min:        bpmMin,
    rmssd_ms:       rmssd,
    zone_time_sec:  zoneTimes,
    samples:        hrSamples,
  };
  if (pausedSec > 0) hrSessionData.paused_sec = pausedSec;

  // Render report
  var reportEl = document.getElementById('hr-report-section');
  if (reportEl) {
    var mm = Math.floor(durationSec / 60);
    var ss = durationSec % 60;
    reportEl.innerHTML =
      '<div class="section-head">' +
        '<span class="section-head__no">RPT</span>' +
        '<span class="section-head__title">Session Report</span>' +
        '<span class="section-head__right">' + exerciseType.toUpperCase() + '</span>' +
      '</div>' +
      '<div style="padding:var(--s-7) var(--s-9)">' + hrBuildLineChart(hrSamples, 380, 190) + '</div>' +
      '<div class="field-grid field-grid--3" style="padding:var(--s-6) var(--s-9)">' +
        '<div class="cell"><span class="cell__label">DURATION</span>' +
          '<span class="cell__value">' + String(mm).padStart(2,'0') + ':' + String(ss).padStart(2,'0') + '</span></div>' +
        '<div class="cell"><span class="cell__label">AVG BPM</span>' +
          '<span class="cell__value">' + bpmAvg + '</span></div>' +
        '<div class="cell"><span class="cell__label">MAX BPM</span>' +
          '<span class="cell__value">' + bpmMax + '</span></div>' +
        '<div class="cell"><span class="cell__label">MIN BPM</span>' +
          '<span class="cell__value">' + bpmMin + '</span></div>' +
        '<div class="cell"><span class="cell__label">HRV RMSSD</span>' +
          '<span class="cell__value">' + (rmssd !== null ? rmssd + ' ms' : '—') + '</span></div>' +
        (pausedSec > 0 ?
        '<div class="cell"><span class="cell__label">PAUSED</span>' +
          '<span class="cell__value">' + Math.floor(pausedSec/60) + ':' + String(pausedSec%60).padStart(2,'0') + '</span></div>' : '') +
      '</div>' +
      '<div class="section-head" style="margin-top:2px">' +
        '<span class="section-head__no">ZNS</span>' +
        '<span class="section-head__title">Zone Breakdown</span>' +
      '</div>' +
      '<div style="padding:var(--s-7) var(--s-9)">' + hrBuildZoneChart(zoneTimes, durationSec) + '</div>';
    reportEl.style.display = '';
  }

  // Show LOG IT footer
  showSaf('LOG IT');
}

function hrCalcRMSSD(rrArray) {
  if (!rrArray || rrArray.length < 2) return null;
  var sumSq = 0;
  for (var i = 1; i < rrArray.length; i++) {
    var diff = rrArray[i] - rrArray[i - 1];
    sumSq += diff * diff;
  }
  return Math.round(Math.sqrt(sumSq / (rrArray.length - 1)));
}

function hrCalcZoneTimes(samples, totalSec) {
  var times = { sub1: 0, z1: 0, z2: 0, z3: 0, z4: 0, z5: 0 };
  for (var i = 0; i < samples.length; i++) {
    var zone = HR_ZONES.find(function(z) { return samples[i].bpm >= z.min && samples[i].bpm <= z.max; });
    if (!zone) zone = HR_ZONES[0];
    var dur = (i < samples.length - 1) ? (samples[i+1].t - samples[i].t) : Math.max(0, totalSec - samples[i].t);
    times[zone.key] = (times[zone.key] || 0) + dur;
  }
  return times;
}

function hrBuildLineChart(samples, width, height) {
  if (!samples || samples.length < 2) {
    return '<div class="empty-state" style="padding:var(--s-9)">Insufficient data for chart</div>';
  }
  var pad = { top: 20, right: 12, bottom: 28, left: 38 };
  var W   = width  - pad.left - pad.right;
  var H   = height - pad.top  - pad.bottom;

  var maxT   = samples[samples.length - 1].t || 1;
  var bpms   = samples.map(function(s) { return s.bpm; });
  var rawMin = Math.min.apply(null, bpms);
  var rawMax = Math.max.apply(null, bpms);
  var yMin   = Math.max(40,  rawMin - 15);
  var yMax   = Math.min(185, rawMax + 15);

  function xScale(t)   { return (t   / maxT)         * W; }
  function yScale(bpm) { return H - ((bpm - yMin) / (yMax - yMin)) * H; }

  // Zone background bands
  var bands = HR_ZONES.map(function(z) {
    var bandTop    = Math.max(0, Math.min(H, yScale(z.max + 1)));
    var bandBottom = Math.max(0, Math.min(H, yScale(z.min)));
    if (bandBottom <= bandTop) return '';
    return '<rect x="0" y="' + bandTop.toFixed(1) + '" width="' + W + '" height="' +
      (bandBottom - bandTop).toFixed(1) + '" fill="' + z.color + '" opacity="0.10"/>';
  }).join('');

  // Polyline points
  var pts = samples.map(function(s) {
    return xScale(s.t).toFixed(1) + ',' + yScale(s.bpm).toFixed(1);
  }).join(' ');

  // Y-axis labels (3 values)
  var yVals = [yMin, Math.round((yMin + yMax) / 2), yMax];
  var yLabels = yVals.map(function(v) {
    return '<text x="-5" y="' + yScale(v).toFixed(1) + '" text-anchor="end" ' +
      'font-size="9" fill="#94a3b8" dominant-baseline="middle" font-family="monospace">' + v + '</text>';
  }).join('');

  // FIX 3: X-axis labels — 30s granularity for short sessions, m:ss when needed
  var xLabels = '';
  var xStepSec = Math.max(30, Math.ceil(maxT / 4 / 30) * 30);
  var wholeMin = (xStepSec % 60 === 0);
  for (var t = 0; t <= maxT; t += xStepSec) {
    var xPos = xScale(t);
    var lbl  = wholeMin ? (Math.floor(t / 60) + 'm')
                        : (Math.floor(t / 60) + ':' + String(t % 60).padStart(2, '0'));
    xLabels += '<text x="' + xPos.toFixed(1) + '" y="' + (H + 18) + '" text-anchor="middle" ' +
      'font-size="9" fill="#94a3b8" font-family="monospace">' + lbl + '</text>';
  }

  // Axes
  var axes =
    '<line x1="0" y1="' + H + '" x2="' + W + '" y2="' + H + '" stroke="#d6cfbf" stroke-width="1"/>' +
    '<line x1="0" y1="0" x2="0" y2="' + H + '" stroke="#d6cfbf" stroke-width="1"/>';

  return '<svg viewBox="0 0 ' + width + ' ' + height + '" xmlns="http://www.w3.org/2000/svg" ' +
    'style="width:100%;height:auto;display:block">' +
    '<g transform="translate(' + pad.left + ',' + pad.top + ')">' +
      bands +
      '<polyline points="' + pts + '" fill="none" stroke="#3a8fd1" stroke-width="2" ' +
        'stroke-linejoin="round" stroke-linecap="round"/>' +
      yLabels + xLabels + axes +
    '</g></svg>';
}

function hrBuildZoneChart(zoneTimes, totalSec) {
  if (!totalSec) return '<div class="empty-state">No zone data</div>';
  return HR_ZONES.map(function(z) {
    var sec = (zoneTimes && zoneTimes[z.key]) || 0;
    var pct = totalSec > 0 ? Math.round((sec / totalSec) * 100) : 0;
    var mm  = Math.floor(sec / 60);
    var ss  = sec % 60;
    var timeStr = mm + ':' + String(ss).padStart(2, '0');
    return '<div style="margin-bottom:var(--s-7)">' +
      '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">' +
        '<span style="font:600 10px/1 var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:' +
          (sec > 0 ? 'var(--ink)' : 'var(--ink-muted)') + '">' + z.label + '</span>' +
        '<span style="font:400 11px/1 var(--font-mono);color:var(--ink-dim)">' + timeStr + '</span>' +
      '</div>' +
      '<div style="height:12px;background:var(--paper-edge);border:1px solid var(--paper-line)">' +
        '<div style="height:100%;width:' + pct + '%;background:' + z.color +
          ';opacity:' + (sec > 0 ? '0.85' : '0') + ';transition:width .3s ease"></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

async function submitHeartRate() {
  if (!hrSessionData) { showErr('No session data — complete a session first'); return; }
  var startISO = hrStartTime ? new Date(hrStartTime).toISOString() : new Date().toISOString();
  var endISO   = new Date(hrEndTime || (hrStartTime + hrSessionData.duration_sec * 1000)).toISOString();
  var noteEl   = document.getElementById('f-hr-note');
  var note     = noteEl ? noteEl.value.trim() || null : null;

  await writeEntry('heart_rate', startISO, endISO, note, hrSessionData);

  // Cleanup all HR state after successful write
  hrSessionData = null;
  hrStartTime   = null;
  hrEndTime     = null;
  hrPausedAt    = null;
  hrPausedTotal = 0;
  hrSamples     = [];
  hrRRBuffer    = [];
  hrBuffer      = [];
  if (hrDevice) { try { hrDevice.gatt.disconnect(); } catch(e){} }
  hrDevice = null;
  hrChar   = null;
}

    '<div class="med-header">' +

    '<span class="rx-badge rx-badge--confirm">&#10003;</span>' +
    '<span class="header-eyebrow">FILED &middot; ' + filed + '</span>' +
    '<span class="header-sync"><span id="undo-txt" style="color:var(--state-warn)">UNDO ' + undoSec + 's</span></span>' +
    '</div>' +
    '<div class="header-sub">' + fmtHeaderDate(new Date()) + '</div>' +
    '<div class="header-title">' + meta.label + '</div>' +
    '</div>' +
    '<div class="section"><div class="section-head"><span class="section-head__no">&sect;01</span><span class="section-head__title">Record</span><span class="section-head__right">' + meta.code + '</span></div>' +
    '<div class="confirm-row"><span class="confirm-row__key">entry type</span><span class="confirm-row__val">' + e.entry_type + '</span></div>' +
    '<div class="confirm-row"><span class="confirm-row__key">started at</span><span class="confirm-row__val">' + new Date(e.started_at).toLocaleString() + '</span></div>' +
    (e.ended_at ? '<div class="confirm-row"><span class="confirm-row__key">ended at</span><span class="confirm-row__val">' + new Date(e.ended_at).toLocaleString() + '</span></div>' : '') +
    (e.notes ? '<div class="confirm-row"><span class="confirm-row__key">notes</span><span class="confirm-row__val">' + e.notes + '</span></div>' : '') +
    '<div class="confirm-row"><span class="confirm-row__key">metadata</span><span class="confirm-row__val" style="font-size:11px;font-family:var(--font-mono)">' + JSON.stringify(m).substring(0, 140) + '&hellip;</span></div>' +
    '</div>' +

  var undoInterval = setInterval(function() {

function showSafUndo(entryId, undoInterval) {

function showSafBackOnly() {
  var saf = document.getElementById('saf');

// ── CORE WRITE ─────────────────────────────────────────────────────────────
async function writeEntry(type, startedAt, endedAt, notes, metadata) {
  setBtnLoading(true); clearErr();
  if (!db) { showErr('Backend not configured'); setBtnLoading(false); return; }
  var result = await PB.insert({
    entry_type: type, started_at: startedAt,
    ended_at: endedAt || null, notes: notes || null, metadata: metadata,
  });
  setBtnLoading(false);
  if (result.error) { showErr(result.error.message || 'could not write entry — retry'); autoHideErr(6000); return; }
  confirmEntry = result.data;
  navigate('#confirm');
}

async function undoEntry(id, intervalId) {
  clearInterval(intervalId);
  if (db && id) await PB.remove(id);
  confirmEntry = null;
  navigate('#home');
}

// ── FASTING PERSISTENCE ────────────────────────────────────────────────────
function getActiveFast()   { try { return JSON.parse(localStorage.getItem('jf')); } catch(e) { return null; } }
function saveActiveFast(o) { localStorage.setItem('jf', JSON.stringify(o)); }
function clearActiveFast() { localStorage.removeItem('jf'); }

async function endFast() {
  var f = getActiveFast();
  if (!f) return;
  var endedAt = new Date().toISOString();
  if (db && f.id) await PB.update(f.id, { ended_at: endedAt });
  clearActiveFast();
  clearInterval(fastTick);
  navigate('#home');
}

// ── DOSE STORAGE ───────────────────────────────────────────────────────────
function getStoredDoses() {
  try { return JSON.parse(localStorage.getItem('sup_doses') || '{}'); } catch(e) { return {}; }
}
function saveDoses(taken) {
  var stored = getStoredDoses();
  taken.forEach(function(item) { if (item.dose) stored[item.name] = item.dose; });
  localStorage.setItem('sup_doses', JSON.stringify(stored));
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {

  if (e.key === 'Escape' && location.hash !== '#home') navigate('#home');
});

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmtHeaderDate(d) {
  return d.toLocaleDateString('en-US', { year:'numeric', month:'2-digit', day:'2-digit' }) +
    ' · ' + d.toLocaleDateString('en-US', { weekday:'long' });
}
function fmtDur(ms) {
  var h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000), s = Math.floor((ms % 60000) / 1000);
  return pad(h) + ':' + pad(m) + ':' + pad(s);
}
function pad(n) { return String(n).padStart(2, '0'); }
function ago(d) {
  var diff = Date.now() - d;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function toLocalDatetimeInput(d) {
  var p = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());
}

// ── LOG REVIEW ─────────────────────────────────────────────────────────────
function formatMetaReadable(type, meta, notes, startedAt, endedAt) {
  var rows = [];
  function row(k, v) { if (v !== null && v !== undefined && v !== '') rows.push({ k: k, v: String(v) }); }
  var fmtTime = function(iso) {
    return iso ? new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit', hour12:false }) : '';
  };
  row('logged', fmtTime(startedAt));
  switch (type) {
    case 'heart_rate':
      row('exercise',    meta.exercise_type || '');
      var durM = Math.floor((meta.duration_sec || 0) / 60);
      var durS = (meta.duration_sec || 0) % 60;
      row('duration',    durM + ' min ' + String(durS).padStart(2,'0') + ' sec');
      if (meta.paused_sec) row('paused', Math.floor(meta.paused_sec/60) + ':' + String(meta.paused_sec%60).padStart(2,'0') + ' (BLE dropout)');
      row('avg bpm',     meta.bpm_avg || '');
      row('max bpm',     meta.bpm_max || '');
      row('min bpm',     meta.bpm_min || '');
      if (meta.rmssd_ms) row('hrv rmssd', meta.rmssd_ms + ' ms');
      if (meta.zone_time_sec) {
        var zt = meta.zone_time_sec;
        HR_ZONES.forEach(function(z) {
          var s = zt[z.key] || 0;
          if (s > 0) row(z.label.toLowerCase(), Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'));
        });
      }
      break;
    case 'fast':
      if (endedAt) {
        var dur = ((new Date(endedAt) - new Date(startedAt)) / 3600000).toFixed(1);
        row('duration', dur + ' hours');
        row('ended', fmtTime(endedAt));
      } else {
        row('status', 'in progress');
      }
      row('type', meta.fast_type || 'manual');
      if (meta.last_meal_at) row('last meal', fmtTime(meta.last_meal_at));
      break;
    case 'supplement':
      var taken = meta.taken || [];
      if (taken.length) {
        taken.forEach(function(s) { row('taken', s.name + ' · ' + s.dose); });
      }
      var skipped = (meta.skipped || []).filter(function(s) { return s.reason !== 'hold'; });
      if (skipped.length) row('skipped', skipped.map(function(s) { return s.name; }).join(', '));
      if (meta.preset_time && meta.preset_time !== 'now') row('time preset', meta.preset_time);
      break;
    case 'sauna':
      row('type', meta.type || meta.heat_type || '');
      row('temperature', (meta.temp_f || meta.temperature_f || '') + ' °F');
      row('duration', (meta.duration_min || '') + ' min');
      if (meta.location) row('location', meta.location);
      break;
    case 'red_light':
      row('zone', meta.zone || meta.area || '');
      row('duration', (meta.duration_min || '') + ' min');
      if (meta.wavelength) row('wavelength', meta.wavelength);
      if (meta.distance_cm) row('distance', meta.distance_cm + ' cm');
      break;
    case 'alcohol':
      row('drinks', meta.drinks || '');
      row('type', meta.type || '');
      break;
    case 'massage':
      row('duration', (meta.duration_min || '') + ' min');
      row('type', meta.type || '');
      break;
    case 'flight':
      row('route', (meta.from || '') + ' → ' + (meta.to || ''));
      if (meta.departure_time) row('departure', meta.departure_time);
      break;
    case 'timezone':
      row('from', meta.from_tz || '');
      row('to', meta.to_tz || '');
      if (meta.offset_hours !== null && meta.offset_hours !== undefined)
        row('offset', (meta.offset_hours >= 0 ? '+' : '') + meta.offset_hours + ' hours');
      break;
    case 'note':
      row('category', meta.category || '');
      row('text', meta.text || notes || '');
      break;
    default:
      Object.keys(meta).forEach(function(k) {
        var v = meta[k];
        if (typeof v !== 'object') row(k, v);
      });
  }
  if (notes && type !== 'note') row('notes', notes);
  return rows;
}

async function renderLogReview() {
  var app = document.getElementById('app');
  var reviewMeta = { code:'LR', label:'Log Review' };
  app.innerHTML = formHeader(reviewMeta, '10', 'Recent Entries') +
    '<div class="section"><div class="section-head">' +
    '<span class="section-head__no">&sect;01</span>' +
    '<span class="section-head__title">Last 10 entries</span>' +
    '<span class="section-head__right" id="rv-count">loading&hellip;</span>' +
    '</div>' +
    '<div id="rv-list"><div class="empty-state">Loading&hellip;</div></div>' +
    '</div>' +
    '<div class="audit-footer">&middot; tap any row to expand details</div>';
  if (!db) {
    document.getElementById('rv-list').innerHTML = '<div class="empty-state">configure backend</div>';
    return;
  }
  var result = await PB.list({ sort: '-started_at', perPage: 10 });
  var countEl = document.getElementById('rv-count');
  if (result.error || !result.data || !result.data.length) {
    document.getElementById('rv-list').innerHTML = '<div class="empty-state">no entries found</div>';
    if (countEl) countEl.textContent = '0 entries';
    return;
  }
  var data = result.data;
  if (countEl) countEl.textContent = data.length + (data.length === 1 ? ' entry' : ' entries');
  document.getElementById('rv-list').innerHTML = data.map(function(e, idx) {
    var m       = EMETA[e.entry_type] || { code: e.entry_type.substring(0,2).toUpperCase(), label: e.entry_type };
    var meta    = e.metadata || {};
    var timeStr = new Date(e.started_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false });
    var readable = formatMetaReadable(e.entry_type, meta, e.notes, e.started_at, e.ended_at);
    var detailRows = readable.map(function(r) {
      return '<div class="review-entry__detail-row">' +
        '<span class="review-entry__detail-key">' + r.k + '</span>' +
        '<span class="review-entry__detail-val">' + r.v + '</span>' +
      '</div>';
    }).join('');
    return '<div class="review-entry" onclick="toggleReviewDetail(' + idx + ')">' +
      '<div class="review-entry__head">' +
        '<span class="review-entry__code">' + m.code + '</span>' +
        '<span class="review-entry__label">' + m.label + '</span>' +
        '<span class="review-entry__time">' + timeStr + '</span>' +
      '</div>' +
      '<div class="review-entry__detail" id="rv-detail-' + idx + '">' + detailRows + '</div>' +
    '</div>';
  }).join('');
  showSaf('&lsaquo; Back');
  document.getElementById('saf-btn').onclick = function() { navigate('#home'); };
}

function toggleReviewDetail(idx) {
  var el = document.getElementById('rv-detail-' + idx);
  if (el) el.classList.toggle('open');
}
